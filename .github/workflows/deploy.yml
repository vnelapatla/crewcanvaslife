name: Deploy to AWS EC2

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:


jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Build with Maven
      run: mvn -f pom-monolith.xml clean package -DskipTests

    - name: Deploy to EC2
      uses: appleboy/scp-action@v0.1.4
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}
        source: "target/crewcanvas-monolith-0.0.1-SNAPSHOT.jar"
        target: "~/app"
        strip_components: 1

    - name: Restart Application on EC2
      uses: appleboy/ssh-action@v0.1.10
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          # Robust cleanup: Kill anything on 8080 and wait for it to die
          echo "Stopping old version..."
          fuser -k 8080/tcp || true
          sleep 5
          
          # Force kill if still alive
          PID=$(lsof -t -i:8080)
          if [ ! -z "$PID" ]; then
            kill -9 $PID || true
          fi

          echo "Starting new version..."
          # Start with a specific tag to help pgrep
          nohup java -Dappname=crewcanvas-monolith -jar ~/app/crewcanvas-monolith-0.0.1-SNAPSHOT.jar > ~/app/app.log 2>&1 &
          
          # Wait and verify
          sleep 15
          if netstat -tuln | grep :8080; then
            echo "SUCCESS: New application is listening on port 8080"
          else
            echo "FAILURE: Application did not start on port 8080. Logs:"
            tail -n 50 ~/app/app.log
            exit 1
          fi
