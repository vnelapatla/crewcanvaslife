# Force trigger deployment - 2026-04-22 18:29
name: Deploy to AWS EC2

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:


jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Build and Test with Maven
      run: |
        mvn clean package
        # Verify the file exists
        ls -lh target/*.jar

    - name: Prepare Server
      uses: appleboy/ssh-action@v0.1.10
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          mkdir -p ~/app
          cd ~/app
          # Ensure current_port.txt exists if it's the first time
          if [ ! -f current_port.txt ]; then echo "8081" > current_port.txt; fi

    - name: Upload Artifacts
      uses: appleboy/scp-action@v0.1.4
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}
        source: "target/*.jar,UPDATE_SCHEMA.sql,deploy.sh"
        target: "~/app"
        strip_components: 0 # Keep target/ folder if needed, but we usually want it flat
        overwrite: true

    - name: Execute Blue-Green Deploy
      uses: appleboy/ssh-action@v0.1.10
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          cd ~/app
          # Move files to root of app dir for easier handling
          mv target/*.jar . 2>/dev/null || true
          chmod +x deploy.sh
          
          # Apply database migrations first
          echo "Applying database migrations..."
          mysql -u root -proot crewcanvas_db < UPDATE_SCHEMA.sql || echo "Migration notice: Migration might have failed or already applied."
          
          # Run the blue-green deployment script
          ./deploy.sh

    - name: Nginx Optimization
      uses: appleboy/ssh-action@v0.1.10
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          echo "Ensuring Nginx client_max_body_size is set..."
          NGINX_CONF="/etc/nginx/nginx.conf"
          if [ -f "$NGINX_CONF" ]; then
            if ! sudo grep -q "client_max_body_size" "$NGINX_CONF"; then
              sudo sed -i '/http {/a \    client_max_body_size 50M;' "$NGINX_CONF"
              sudo nginx -t && sudo systemctl reload nginx
            fi
          fi

