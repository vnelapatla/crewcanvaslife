name: Deploy to AWS EC2

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:


jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Build with Maven
      run: |
        mvn -f pom-monolith.xml clean package -DskipTests
        # Verify the file exists
        ls -lh target/crewcanvas-monolith-0.0.1-SNAPSHOT.jar

    - name: Deploy and Restart
      uses: appleboy/ssh-action@v0.1.10
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          echo "Connected! Cleaning and Starting..."
          cd ~/app
          # Kill old process on 8081
          echo "Cleaning port 8081..."
          fuser -k 8081/tcp || true
          # Fallback: find PID of any java process running our jar
          PIDS=$(ps -ef | grep 'crewcanvas-monolith' | grep -v grep | awk '{print $2}')
          if [ ! -z "$PIDS" ]; then kill -9 $PIDS || true; fi
          # Force remove old JARs to clear space immediately
          rm -f *.jar || true
          # Upload happens in a separate step, but we will wait for it here
          echo "Waiting for new JAR to arrive..."
          sleep 5
          # Start (This assumes SCP finishes after this step starts - we'll flip the order back to be safe)

    - name: Deploy JAR
      uses: appleboy/scp-action@v0.1.4
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}
        source: "target/*.jar"
        target: "~/app"
        strip_components: 1
        overwrite: true

    - name: Final Startup and Nginx Fix
      uses: appleboy/ssh-action@v0.1.10
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          # 1. Start the Java App
          echo "Process cleanup..."
          # Kill old process on 8081
          sudo fuser -k 8081/tcp || echo "Port 8081 already free."
          pkill -f 'crewcanvas-monolith' || echo "No existing monolith process found."
          
          echo "Starting the application..."
          # Run with nohup, ensure it detaches correctly
          cd ~/app
          nohup java -Dserver.port=8081 -jar crewcanvas-monolith-0.0.1-SNAPSHOT.jar > app.log 2>&1 &
          
          # Small wait to check if it's running
          sleep 10
          if ps -ef | grep 'crewcanvas-monolith' | grep -v grep > /dev/null; then
            echo "Application started successfully."
          else
            echo "ERROR: Application failed to start. Check ~/app/app.log for details."
            cat app.log | tail -n 50
            exit 1
          fi

          # 2. Fix Nginx Upload Limit (50MB)
          echo "Updating Nginx configuration..."
          NGINX_CONF="/etc/nginx/nginx.conf"
          
          if [ -f "$NGINX_CONF" ]; then
            if sudo grep -q "client_max_body_size" "$NGINX_CONF"; then
              echo "Updating existing client_max_body_size..."
              sudo sed -i 's/client_max_body_size.*/client_max_body_size 50M;/' "$NGINX_CONF"
            else
              echo "Adding client_max_body_size to http block..."
              sudo sed -i '/http {/a \    client_max_body_size 50M;' "$NGINX_CONF"
            fi
            
            # Test and Reload Nginx
            echo "Testing Nginx configuration..."
            if sudo nginx -t; then
              sudo systemctl reload nginx
              echo "Nginx reloaded with 50MB limit."
            else
              echo "ERROR: Nginx configuration test failed. Reverting changes or check manually."
              exit 1
            fi
          else
            echo "WARNING: /etc/nginx/nginx.conf not found. Skipping Nginx fix."
          fi
