name: Deploy to AWS EC2

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:


jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Build with Maven
      run: |
        mvn -f pom-monolith.xml clean package -DskipTests
        mkdir -p publish
        cp target/*.jar publish/

    - name: Deploy to EC2
      uses: appleboy/scp-action@v0.1.4
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}
        source: "publish/*.jar"
        target: "~/app"
        strip_components: 1
        overwrite: true

    - name: Restart Application on EC2
      uses: appleboy/ssh-action@v0.1.10
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          # Stop anything on 8081
          echo "Cleaning up port 8081..."
          PID=$(lsof -t -i:8081)
          if [ ! -z "$PID" ]; then
            kill -9 $PID || true
          fi
          sleep 2

          echo "Starting application on 8081..."
          # The DISOWN and redirection ensures the SSH session can close immediately
          nohup java -Dserver.port=8081 -jar ~/app/crewcanvas-monolith-0.0.1-SNAPSHOT.jar > ~/app/app.log 2>&1 < /dev/null &
          
          echo "Deployment triggered successfully. Monitoring logs for 15 seconds..."
          sleep 15
          tail -n 20 ~/app/app.log
