# Force trigger deployment - 2026-04-22 18:29
name: Deploy to AWS EC2

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:


jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Build and Test with Maven
      run: |
        mvn clean package
        # Verify the file exists
        ls -lh target/*.jar

    - name: Deploy and Restart
      uses: appleboy/ssh-action@v0.1.10
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          mkdir -p ~/app
          cd ~/app
          # Nuclear Kill: Stop ALL Java processes
          echo "Terminating all Java processes..."
          sudo killall -9 java || true
          sudo fuser -k 8080/tcp || true
          rm -rf * || true
          # Upload happens in a separate step, but we will wait for it here
          echo "Waiting for new JAR to arrive..."
          sleep 5

    - name: Deploy JAR
      uses: appleboy/scp-action@v0.1.4
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}
        source: "target/*.jar,UPDATE_SCHEMA.sql"
        target: "~/app"
        strip_components: 1
        overwrite: true

    - name: Final Startup and Nginx Fix
      uses: appleboy/ssh-action@v0.1.10
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          # 1. Start the Java App
          echo "Applying database migrations..."
          sudo mysql crewcanvas_db < ~/app/UPDATE_SCHEMA.sql || echo "Migration notice: sudo mysql failed, trying with password..."
          mysql -u root -proot crewcanvas_db < ~/app/UPDATE_SCHEMA.sql || echo "All migration attempts failed. Please check MySQL credentials on the server."

          echo "Process cleanup..."
          sudo fuser -k 8080/tcp || echo "Port already free."

          echo "Starting the application..."
          cd ~/app

          nohup java \
          -Xms64m -Xmx160m \
          -XX:+UseSerialGC \
          -XX:MaxMetaspaceSize=128m \
          -Dserver.port=8081 \
          -jar *.jar \
          > app.log 2>&1 &

          sleep 25

          echo "Checking application..."
          if curl -s http://localhost:8081 > /dev/null; then
            echo "Application started successfully."
          else
            echo "ERROR: App failed"
            tail -50 app.log
            exit 1
          fi

          # 2. Fix Nginx Upload Limit (50MB)
          # Debug Nginx Config
          sudo cat /etc/nginx/sites-enabled/* || true
          echo "Updating Nginx configuration..."
          NGINX_CONF="/etc/nginx/nginx.conf"
          
          if [ -f "$NGINX_CONF" ]; then
            if sudo grep -q "client_max_body_size" "$NGINX_CONF"; then
              echo "Updating existing client_max_body_size..."
              sudo sed -i 's/client_max_body_size.*/client_max_body_size 50M;/' "$NGINX_CONF"
            else
              echo "Adding client_max_body_size to http block..."
              sudo sed -i '/http {/a \    client_max_body_size 50M;' "$NGINX_CONF"
            fi
            
            # Test and Reload Nginx
            echo "Testing Nginx configuration..."
            if sudo nginx -t; then
              sudo systemctl reload nginx
              echo "Nginx reloaded with 50MB limit."
            else
              echo "ERROR: Nginx configuration test failed. Reverting changes or check manually."
              exit 1
            fi
          else
            echo "WARNING: /etc/nginx/nginx.conf not found. Skipping Nginx fix."
          fi
