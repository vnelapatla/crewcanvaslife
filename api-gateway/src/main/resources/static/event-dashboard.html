<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Events - CrewCanvas</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/events.css">
</head>

<body>
    <aside class="sidebar">
        <div class="brand">
            <h2>CrewCanvas</h2>
            <p>Where all crafts connect</p>
        </div>
        <nav class="nav-menu">
            <a href="feed.html" class="nav-item">
                <span class="icon">📰</span> Feed
            </a>
            <a href="home.html" class="nav-item">
                <span class="icon">🏠</span> Dashboard
            </a>
            <a href="crew-search.html" class="nav-item">
                <span class="icon">🔍</span> Crew Search
            </a>
            <a href="messages.html" class="nav-item">
                <span class="icon">💬</span> Messages
            </a>
            <a href="event.html" class="nav-item active">
                <span class="icon">🎬</span> Events
            </a>
        </nav>
    </aside>

    <!-- Main Content -->
    <div class="main-content">
        <!-- Top Bar -->
        <header class="top-bar">
            <h1>My Events Dashboard</h1>
            <div class="top-bar-right">
                <button class="btn-primary" onclick="window.location.href='launch-audition.html'">+ Create New
                    Event</button>
            </div>
        </header>

        <!-- My Events List -->
        <div id="myEventsContainer">
            <!-- Events will be loaded here -->
        </div>
    </div>

    <script src="js/utils.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            checkAuth();
            const userId = getCurrentUserId();

            try {
                const response = await fetch(`${API_BASE_URL}/api/events/user/${userId}`);
                const events = await response.json();

                const container = document.getElementById('myEventsContainer');

                if (events.length === 0) {
                    container.innerHTML = '<div class="card text-center"><p>You haven\'t created any events yet.</p><button class="btn-primary" onclick="window.location.href=\'launch-audition.html\'">Create Your First Event</button></div>';
                    return;
                }

                container.innerHTML = events.map(event => `
                    <div class="card mb-2">
                        <div style="display: flex; justify-content: space-between; align-items: start;">
                            <div style="flex: 1;">
                                <h3>${event.title}</h3>
                                <p><strong>Type:</strong> ${event.eventType}</p>
                                <p><strong>Date:</strong> ${event.date} ${event.time || ''}</p>
                                <p><strong>Location:</strong> ${event.location}</p>
                                <p><strong>Applicants:</strong> ${event.applicants || 0}</p>
                                <p>${event.description || ''}</p>
                            </div>
                            <div style="display: flex; flex-direction: column; gap: 8px;">
                                <button class="btn-primary" onclick="window.location.href='event-management.html?id=${event.id}'">Manage Applications</button>
                                <button class="btn-secondary" onclick="window.location.href='form-builder.html?id=${event.id}'">Modify Registration Form</button>
                                <div style="display: flex; gap: 8px;">
                                    <button class="btn-danger" style="flex:1" onclick="deleteEvent(${event.id})">Delete</button>
                                </div>
                            </div>
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                console.error('Error loading events:', error);
            }
        });

        async function deleteEvent(id) {
            if (!confirm('Are you sure you want to delete this event?')) return;

            try {
                await fetch(`${API_BASE_URL}/api/events/${id}`, { method: 'DELETE' });
                showMessage('Event deleted successfully!', 'success');
                location.reload();
            } catch (error) {
                showMessage('Error deleting event', 'error');
            }
        }

        function editEvent(id) {
            showMessage('Edit functionality coming soon!', 'info');
        }
    </script>
    <style>
        .btn-danger {
            background: #f44336;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
        }
    </style>
</body>

</html>
