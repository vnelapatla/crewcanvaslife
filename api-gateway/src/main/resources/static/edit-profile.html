<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Profile - CrewCanvas</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/edit-profile.css">
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <main class="main-content">
        <div class="edit-profile-container">
            
            <!-- Profile Picture Section -->
            <div class="card">
                <div class="card-header">
                    <h3>Profile Picture</h3>
                </div>
                <div class="profile-pic-row">
                    <div class="avatar-preview-container" id="profilePicPreview">
                        <div class="avatar-placeholder">
                            <i class="fa-solid fa-user"></i>
                        </div>
                    </div>
                    <div class="upload-dashed-box" onclick="document.getElementById('profilePicInput').click()">
                        <i class="fa-solid fa-camera fa-xl"></i>
                        <span>Click to upload a new profile picture</span>
                        <input type="file" id="profilePicInput" accept="image/*" style="display: none;">
                    </div>
                </div>
            </div>

            <!-- Basic Information -->
            <div class="card">
                <div class="card-header">
                    <h3>Basic Information</h3>
                </div>
                <div class="form-grid">
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" id="editName" placeholder="Enter your full name">
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="editEmail" placeholder="Enter your email">
                    </div>
                    <div class="form-group">
                        <label>Phone Number</label>
                        <input type="text" id="editPhone" placeholder="Enter your phone number">
                    </div>
                    <div class="form-group">
                        <label>Location</label>
                        <input type="text" id="editLocation" placeholder="Enter your location">
                    </div>
                </div>
            </div>

            <!-- Professional Information -->
            <div class="card">
                <div class="card-header">
                    <h3>Professional Information</h3>
                </div>
                <div class="form-grid">
                    <div class="form-group">
                        <label>Primary Role</label>
                        <select id="editRole">
                            <option value="">Select your primary role</option>
                            <option value="Director">Director</option>
                            <option value="Actor">Actor</option>
                            <option value="Cinematographer">Cinematographer</option>
                            <option value="Editing">Editing</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Number of Projects</label>
                        <select id="editProjects">
                            <option value="">Select number of projects</option>
                            <option value="0-5">0-5</option>
                            <option value="5-10">5-10</option>
                            <option value="10-20">10-20</option>
                            <option value="20+">20+</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Bio</label>
                        <textarea id="editBio" placeholder="Tell us about yourself and your experience..."></textarea>
                    </div>
                </div>
            </div>

            <!-- Skills -->
            <div class="card">
                <div class="card-header">
                    <h3>Skills</h3>
                </div>
                <div class="skills-input-group">
                    <input type="text" id="skillInput" placeholder="Add a skill">
                    <button class="add-skill-btn" onclick="addSkill()">Add</button>
                </div>
                <div class="skills-container" id="skillsContainer">
                    <!-- Skills will be added here -->
                </div>
            </div>

            <!-- Social Links -->
            <div class="card">
                <div class="card-header">
                    <h3>Social Links</h3>
                </div>
                <div class="form-grid">
                    <div class="form-group">
                        <label>LinkedIn Profile</label>
                        <div class="social-input-wrapper">
                            <img src="https://cdn-icons-png.flaticon.com/512/174/174857.png" class="social-icon" alt="LinkedIn">
                            <input type="text" id="editLinkedin" placeholder="https://linkedin.com/in/yourprofile">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Personal Website</label>
                        <div class="social-input-wrapper">
                            <img src="https://cdn-icons-png.flaticon.com/512/1006/1006771.png" class="social-icon" alt="Website">
                            <input type="text" id="editWebsite" placeholder="https://yourwebsite.com">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Instagram</label>
                        <div class="social-input-wrapper">
                            <img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png" class="social-icon" alt="Instagram">
                            <input type="text" id="editInstagram" placeholder="https://instagram.com/yourhandle">
                        </div>
                    </div>
                </div>
            </div>

            <!-- Form Actions -->
            <div class="form-footer">
                <button class="btn-cancel" onclick="window.history.back()">Cancel</button>
                <button class="btn-save" onclick="saveProfile()">Save Changes</button>
            </div>
        </div>
    </main>

    <script src="js/utils.js"></script>
    <script src="js/edit-profile.js"></script>
</body>
</html>
