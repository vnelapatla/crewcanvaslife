<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Management | CrewCanvas</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/events.css">
    <style>
        .management-table {
            background: white;
            border-radius: 18px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.02);
            margin-bottom: 30px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            text-align: left;
            padding: 16px;
            color: var(--primary-orange);
            font-weight: 700;
            font-size: 13px;
            border-bottom: 2px solid #f9f9f9;
            text-transform: uppercase;
        }

        td {
            padding: 16px;
            border-bottom: 1px solid #fcfcfc;
            color: #333;
            font-size: 14px;
        }

        .status-badge {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
        }

        .status-pending {
            background: #eee;
            color: #666;
        }

        .status-shortlisted {
            background: #fff3e6;
            color: #ff8800;
        }

        .status-rejected {
            background: #fee;
            color: #f44;
        }

        .btn-action {
            background: #fff;
            border: 1px solid #eee;
            width: 32px;
            height: 32px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-action:hover {
            border-color: var(--primary-orange);
            color: var(--primary-orange);
        }
    </style>
</head>

<body>
    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="brand">
            <h2>CrewCanvas</h2>
            <p>Where all crafts connect</p>
        </div>
        <nav class="nav-menu">
            <a href="feed.html" class="nav-item">
                <span class="icon">📰</span> Feed
            </a>
            <a href="home.html" class="nav-item">
                <span class="icon">🏠</span> Dashboard
            </a>
            <a href="crew-search.html" class="nav-item">
                <span class="icon">🔍</span> Crew Search
            </a>
            <a href="messages.html" class="nav-item">
                <span class="icon">💬</span> Messages
            </a>
            <a href="launch-audition.html" class="nav-item active">
                <span class="icon">🎬</span> Events
            </a>
        </nav>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <!-- Top Header with Banner -->
        <header class="top-header">
            <div class="top-banner">
                <div class="status-bar">
                    <button class="notify-btn">🔔</button>
                    <a href="settings.html" class="mobile-settings-btn">⚙️</a>
                    <div class="user-profile-box">
                        <div class="user-initials" id="userInitials">US</div>
                    </div>
                </div>
            </div>
        </header>

        <div class="content-body">
            <div class="section-header">
                <div>
                    <p style="color:var(--primary-orange); font-weight:700; font-size:12px; margin:0;" id="eventBadge">
                        EVENT MANAGEMENT</p>
                    <h2 class="section-title" id="eventTitleDisplay">Loading Event...</h2>
                </div>
                <button class="filter-toggle" onclick="exportCSV()">Export Data</button>
            </div>

            <!-- Stats Grid -->
            <div class="features-grid" style="margin-bottom: 30px;">
                <div class="feature-card">
                    <div class="feature-info">
                        <h3>APPLICANTS</h3>
                        <p>Total responses</p>
                    </div>
                    <div class="feature-badge" id="totalApplicants">0</div>
                </div>
                <div class="feature-card">
                    <div class="feature-info">
                        <h3>SHORTLISTED</h3>
                        <p>Potential crew</p>
                    </div>
                    <div class="feature-badge" id="shortlistedCount" style="background:#fff3e6;">0</div>
                </div>
                <div class="feature-card">
                    <div class="feature-info">
                        <h3>PENDING</h3>
                        <p>To be reviewed</p>
                    </div>
                    <div class="feature-badge" id="pendingCount" style="background:#f9f9f9; color:#aaa;">0</div>
                </div>
            </div>

            <div class="management-table">
                <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
                    <div class="search-box-wrapper" style="width:300px;">
                        <input type="text" placeholder="Search applicants..." oninput="filterApplicants(this.value)">
                    </div>
                </div>

                <table>
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Applied For</th>
                            <th>Location</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="applicant-tbody">
                        <!-- Loaded dynamic -->
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script src="js/utils.js"></script>
    <script src="js/event-management.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const userName = localStorage.getItem('userName') || 'User';
            const initials = userName.split(' ').map(n => n[0]).join('').toUpperCase();
            document.getElementById('userInitials').innerText = initials.substring(0, 2);
        });
    </script>
</body>

</html>
