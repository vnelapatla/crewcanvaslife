<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | CrewCanvas</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h1 class="brand-name">CrewCanvas</h1>
                <p class="tagline">Where all crafts connect</p>
            </div>
            <nav class="sidebar-nav">
                <a href="feed.html" class="nav-item">
                    <span class="nav-icon"><i class="fa-solid fa-layer-group"></i></span>
                    <span class="nav-text">Feed</span>
                </a>
                <a href="dashboard.html" class="nav-item active">
                    <span class="nav-icon"><i class="fa-solid fa-house"></i></span>
                    <span class="nav-text">Dashboard</span>
                </a>
                <a href="crew-search.html" class="nav-item">
                    <span class="nav-icon"><i class="fa-solid fa-magnifying-glass"></i></span>
                    <span class="nav-text">Crew Search</span>
                </a>
                <a href="messages.html" class="nav-item">
                    <span class="nav-icon"><i class="fa-solid fa-envelope"></i></span>
                    <span class="nav-text">Messages</span>
                </a>
                <a href="event-dashboard.html" class="nav-item">
                    <span class="nav-icon"><i class="fa-solid fa-film"></i></span>
                    <span class="nav-text">Events</span>
                </a>
            </nav>

            <div class="sidebar-footer" style="margin-top: auto; padding-top: 20px; border-top: 1px solid #222;">
                <a href="login.html" class="nav-item" onclick="localStorage.clear()" id="btnLogout">
                    <span class="nav-icon"><i class="fa-solid fa-right-from-bracket"></i></span>
                    <span class="nav-text">Logout</span>
                </a>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <div class="content-wrapper">
                
                <!-- Welcome Banner -->
                <div class="welcome-banner card">
                    <h1 id="welcomeHeading">Welcome To CrewCanvas !</h1>
                </div>

                <!-- Quick Actions -->
                <div class="quick-actions">
                    <div class="action-card card" onclick="window.location.href='feed.html'" id="btnPostFeed">
                        <div class="action-icon orange-bg">
                            <i class="fa-solid fa-plus"></i>
                        </div>
                        <p>Post Feed</p>
                    </div>
                    <div class="action-card card" onclick="window.location.href='messages.html'" id="btnMessage">
                        <div class="action-icon pink-bg">
                            <i class="fa-solid fa-paper-plane"></i>
                        </div>
                        <p>Message</p>
                    </div>
                    <div class="action-card card" onclick="window.location.href='crew-search.html'" id="btnFindCrew">
                        <div class="action-icon green-bg">
                            <i class="fa-solid fa-magnifying-glass"></i>
                        </div>
                        <p>Find Crew</p>
                    </div>
                    <div class="action-card card" onclick="window.location.href='event-management.html'" id="btnCreateEvent">
                        <div class="action-icon blue-bg">
                            <i class="fa-solid fa-calendar-plus"></i>
                        </div>
                        <p>Create Event</p>
                    </div>
                </div>

                <!-- Stats Section -->
                <div class="stats-section">
                    <!-- Connections -->
                    <div class="stat-card card has-accent" id="connectionsCard">
                        <div class="card-accent-strip">
                            <div class="accent-top"></div>
                            <div class="accent-bottom orange"></div>
                        </div>
                        <div class="stat-content">
                            <div class="stat-main">
                                <span class="stat-icon-large orange-text">
                                    <i class="fa-solid fa-users"></i>
                                </span>
                                <div class="stat-info">
                                    <h3>Total Connections</h3>
                                    <p class="stat-number" id="totalConnections">0</p>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- My Events -->
                    <div class="stat-card card has-accent" id="myEventsCard">
                        <div class="card-accent-strip">
                            <div class="accent-top"></div>
                            <div class="accent-bottom orange"></div>
                        </div>
                        <div class="stat-content">
                            <div class="stat-header">
                                <div class="event-icon-box">
                                    <i class="fa-solid fa-calendar-days orange-text"></i>
                                </div>
                                <div class="stat-title-group">
                                    <h3>MY EVENTS</h3>
                                    <p class="stat-number" id="totalEvents">0</p>
                                </div>
                            </div>
                            <div class="stat-divider"></div>
                            <div class="events-grid">
                                <div class="event-type">
                                    <span class="dot orange"></span>
                                    <span class="label">Courses</span>
                                    <span class="value" id="countCourses">0</span>
                                </div>
                                <div class="event-type">
                                    <span class="dot blue"></span>
                                    <span class="label">Auditions</span>
                                    <span class="value" id="countAuditions">0</span>
                                </div>
                                <div class="event-type">
                                    <span class="dot green"></span>
                                    <span class="label">Contests</span>
                                    <span class="value" id="countContests">0</span>
                                </div>
                                <div class="event-type">
                                    <span class="dot purple"></span>
                                    <span class="label">Workshops</span>
                                    <span class="value" id="countWorkshops">0</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

            </div>
        </main>
    </div>

    <!-- Script to fetch actual data if available -->
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const userId = localStorage.getItem('userId');
            if (userId) {
                try {
                    // Fetch Profile Data for Connections
                    const profileRes = await fetch(`/api/profile/${userId}`);
                    if (profileRes.ok) {
                        const user = await profileRes.json();
                        document.getElementById('totalConnections').innerText = user.followers || 0;
                        if (user.username) {
                            document.getElementById('welcomeHeading').innerText = `Welcome Back, ${user.username} !`;
                        }
                    }

                    // Fetch Events Data
                    const eventsRes = await fetch(`/api/events/user/${userId}`);
                    if (eventsRes.ok) {
                        const events = await eventsRes.json();
                        document.getElementById('totalEvents').innerText = events.length || 0;
                        
                        // Count by type
                        const counts = {
                            'Course': 0,
                            'Audition': 0,
                            'Contest': 0,
                            'Workshop': 0
                        };
                        
                        events.forEach(event => {
                            if (counts.hasOwnProperty(event.eventType)) {
                                counts[event.eventType]++;
                            }
                        });
                        
                        document.getElementById('countCourses').innerText = counts['Course'];
                        document.getElementById('countAuditions').innerText = counts['Audition'];
                        document.getElementById('countContests').innerText = counts['Contest'];
                        document.getElementById('countWorkshops').innerText = counts['Workshop'];
                    }
                } catch (e) {
                    console.error("Failed to load dashboard data", e);
                }
            }
        });
    </script>
</body>
</html>
