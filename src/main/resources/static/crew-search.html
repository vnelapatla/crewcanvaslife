<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crew Search | CrewCanvas</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/crew-search.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>
    <!-- Sidebar (Desktop) -->
    <aside class="sidebar">
        <div class="brand">
            <h2>CrewCanvas</h2>
            <p>Where all crafts connect</p>
        </div>
        <nav class="nav-menu">
            <a href="feed.html" class="nav-item">
                <span class="icon">📰</span> Feed
            </a>
            <a href="home.html" class="nav-item">
                <span class="icon">🏠</span> Dashboard
            </a>
            <a href="crew-search.html" class="nav-item active">
                <span class="icon">🔍</span> Crew Search
            </a>
            <a href="messages.html" class="nav-item">
                <span class="icon"><i class="fa-solid fa-message"></i></span> Messages
            </a>
            <a href="event.html" class="nav-item">
                <span class="icon">🎬</span> Events
            </a>
        </nav>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <header class="top-header"></header>

        <div class="content-body">
            <!-- Section Title -->
            <div class="section-header">
                <h2 class="section-title">TOP CREATORS</h2>
            </div>

            <!-- Feature Cards (Find Crew / Connections) -->
            <div class="features-grid">
                <div class="feature-card active" id="findCrewCard" onclick="switchSearchTab('find')">
                    <div class="feature-icon-circle">👥</div>
                    <div class="feature-info">
                        <h3>TOTAL CREW</h3>
                    </div>
                    <div class="count-badge" id="totalCrewCount">0</div>
                </div>

                <div class="feature-card" id="followingCountCard" onclick="switchSearchTab('connections'); switchConnectionTab('following')">
                    <div class="feature-icon-circle">👤+</div>
                    <div class="feature-info">
                        <h3>MY FOLLOWING</h3>
                        <p>People you follow</p>
                    </div>
                    <div class="count-badge" id="myFollowingCount">0</div>
                </div>

                <div class="feature-card" id="connectionsCard" onclick="switchSearchTab('connections'); switchConnectionTab('followers')">
                    <div class="feature-icon-circle">🤝</div>
                    <div class="feature-info">
                        <h3>MY FOLLOWERS</h3>
                        <p>People following you</p>
                    </div>
                    <div class="count-badge" id="myConnectionsCount">0</div>
                </div>
            </div>

            <!-- Toggle Switch Tabs -->
            <div class="toggle-switch-container">
                <div class="toggle-btn active" id="followingTab" onclick="switchConnectionTab('following')">
                    <span class="icon">👤+</span> Following
                </div>
                <div class="toggle-btn" id="followersTab" onclick="switchConnectionTab('followers')">
                    <span class="icon">👥</span> Followers
                </div>
            </div>

            <!-- Search Bar -->
            <div class="search-section">
                <div class="custom-search-bar">
                    <input type="text" id="searchInput" placeholder="Search people by name or craft...">
                    <div class="search-actions">
                        <button class="image-search-trigger" onclick="document.getElementById('imageSearchInput').click()" title="Search by Image">
                            <i class="fa-solid fa-camera"></i>
                        </button>
                        <span class="search-person-icon">👤</span>
                    </div>
                    <input type="file" id="imageSearchInput" style="display:none" accept="image/*" onchange="handleImageSearch(this)">
                </div>
                
                <!-- Visual Search Result/Scanning UI -->
                <div id="visualSearchOverlay" class="visual-search-container" style="display:none">
                    <div class="scanning-preview">
                        <img id="scannedImagePreview" src="" alt="Scanning...">
                        <div class="scanning-bar"></div>
                    </div>
                    <div class="scanning-info">
                        <h4>AI Biometric Search</h4>
                        <p id="scanningStatusText">Analyzing facial features...</p>
                        <button class="btn-cancel-search" onclick="cancelImageSearch()">Cancel</button>
                    </div>
                </div>
            </div>

            <!-- Results Grid -->
            <div id="searchResults" class="crew-grid" style="margin-top: 40px;">
                <!-- Dynamically loaded -->
            </div>

            <!-- Loading Dots -->
            <div class="scroll-load">
                <div class="loader-dots">
                    <div class="dot dot-1"></div>
                    <div class="dot dot-2"></div>
                    <div class="dot dot-3"></div>
                </div>
            </div>
        </div>
    </main>

    <!-- Universal Bottom Navigation is injected by utils.js -->

    <script src="js/utils.js"></script>
    <script src="js/profile-handler.js"></script>
    <!-- face-api.js for advanced facial recognition -->
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <script src="js/crew-search.js"></script>
</body>

</html>
