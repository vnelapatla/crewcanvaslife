<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no">
    <meta http-equiv="refresh" content="0; url=event.html">
    <script>window.location.href = 'event.html';</script>
    <title>Redirecting...</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/events.css">
</head>
<body>
    <aside class="sidebar">
        <div class="brand"><h2>CrewCanvas</h2><p>Where all crafts connect</p></div>
        <nav class="nav-menu">
            <a href="feed.html" class="nav-item"><i class="fa-solid fa-file-lines"></i> Feed</a>
            <a href="home.html" class="nav-item"><i class="fa-solid fa-house"></i> Dashboard</a>
            <a href="crew-search.html" class="nav-item"><i class="fa-solid fa-magnifying-glass"></i> Search</a>
            <a href="messages.html" class="nav-item"><i class="fa-solid fa-message"></i> Messages</a>
            <a href="event.html" class="nav-item active"><i class="fa-solid fa-clapperboard"></i> Events</a>
        </nav>
    </aside>

    <main class="main-content">
        <header class="top-header"></header>

        <div class="content-body" style="padding-top: 20px;">
            <div class="horizontal-scroll" style="display: flex; gap: 20px; overflow-x: auto; padding-bottom: 20px; scrollbar-width: none; -ms-overflow-style: none;">
                <div class="feature-card active" onclick="switchEventTab('auditions', this)"><i class="fa-solid fa-video"></i> <div><b>AUDITIONS</b><p style="font-size:11px; opacity:0.8;">Casting & Roles</p></div> <b id="auditionCount" style="margin-left:auto; font-size:18px;">0</b></div>
                <div class="feature-card" onclick="switchEventTab('workshops', this)"><i class="fa-solid fa-screwdriver-wrench"></i> <div><b>WORKSHOPS</b><p style="font-size:11px; opacity:0.8;">Skill Building</p></div> <b id="workshopCount" style="margin-left:auto; font-size:18px;">0</b></div>
                <div class="feature-card" onclick="switchEventTab('courses', this)"><i class="fa-solid fa-graduation-cap"></i> <div><b>COURSES</b><p style="font-size:11px; opacity:0.8;">Learning</p></div> <b id="courseCount" style="margin-left:auto; font-size:18px;">0</b></div>
                <div class="feature-card" onclick="switchEventTab('contests', this)"><i class="fa-solid fa-trophy"></i> <div><b>CONTESTS</b><p style="font-size:11px; opacity:0.8;">Awards</p></div> <b id="contestCount" style="margin-left:auto; font-size:18px;">0</b></div>
            </div>

            <div id="eventsGrid" class="events-grid" style="margin-top:30px;"></div>
        </div>
    </main>

    <div class="bottom-nav">
        <a href="feed.html" class="nav-item"><i class="fa-solid fa-file-lines"></i> <span>Feed</span></a>
        <a href="home.html" class="nav-item"><i class="fa-solid fa-house"></i> <span>Home</span></a>
        <a href="crew-search.html" class="nav-item"><i class="fa-solid fa-magnifying-glass"></i> <span>Search</span></a>
        <a href="messages.html" class="nav-item"><i class="fa-solid fa-message"></i> <span>Chat</span></a>
        <a href="event.html" class="nav-item active"><i class="fa-solid fa-clapperboard"></i> <span>Events</span></a>
    </div>

    <button class="fab" onclick="showChoiceModal()"><i class="fa-solid fa-plus"></i></button>

    <div id="choiceModal" class="modal" style="display: none;">
        <div class="modal-content" style="max-width: 500px;">
            <div class="modal-header"><h2>What to create?</h2><span class="close" onclick="closeChoiceModal()"><i class="fa-solid fa-xmark"></i></span></div>
            <div class="choices-grid">
                <div class="choice-item" onclick="openCreateForm('Workshop')"><div class="choice-icon pink"><i class="fa-solid fa-screwdriver-wrench"></i></div><span>Workshop</span></div>
                <div class="choice-item" onclick="openCreateForm('Course')"><div class="choice-icon green"><i class="fa-solid fa-graduation-cap"></i></div><span>Course</span></div>
                <div class="choice-item" onclick="openCreateForm('Contest')"><div class="choice-icon yellow"><i class="fa-solid fa-trophy"></i></div><span>Contest</span></div>
                <div class="choice-item" onclick="openCreateForm('Audition')"><div class="choice-icon blue"><i class="fa-solid fa-video"></i></div><span>Audition</span></div>
            </div>
        </div>
    </div>

    <script src="js/utils.js"></script>
    <script src="js/profile-handler.js"></script>
    <script src="js/events.js"></script>
    <script>
        function showChoiceModal() { document.getElementById('choiceModal').style.display = 'flex'; }
        function closeChoiceModal() { document.getElementById('choiceModal').style.display = 'none'; }
    </script>
</body>
</html>
