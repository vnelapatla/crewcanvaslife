<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#ffffff">
    <title>CrewCanvas | Login & Sign Up</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    
    <style>
        :root {
            --primary-orange: #ff8c00;
            --primary-red: #ff2d55;
            --text-main: #1e293b;
            --text-dim: #94a3b8;
            --bg-light: #f8fafc;
            --border-color: #e2e8f0;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-light);
            font-family: 'Outfit', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .auth-card {
            background: white;
            width: 100%;
            max-width: 440px;
            border-radius: 35px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.05);
            position: relative;
            overflow: hidden;
            padding: 40px 30px;
            margin: 20px;
            animation: cardFadeIn 0.5s ease-out;
        }

        @keyframes cardFadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .top-accent {
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 5px;
            background: linear-gradient(90deg, #ff8c00, #ff2d55, #ff00ff);
        }

        .logo-section {
            display: flex;
            justify-content: center;
            margin-bottom: 35px;
        }

        .logo-pill {
            background: white;
            padding: 12px 35px;
            border-radius: 100px;
            border: 1px solid #f1f5f9;
            box-shadow: 0 8px 15px rgba(0,0,0,0.03);
            text-align: center;
        }

        .logo-pill h1 {
            font-size: 28px;
            font-weight: 800;
            margin: 0;
            color: var(--primary-orange);
            letter-spacing: -0.5px;
        }

        .logo-pill p {
            margin: 0;
            font-size: 11px;
            color: var(--primary-orange);
            font-weight: 600;
            opacity: 0.8;
        }

        .auth-tabs {
            display: flex;
            border-bottom: 1px solid #f1f5f9;
            margin-bottom: 30px;
        }

        .tab-btn {
            flex: 1;
            background: none;
            border: none;
            padding: 15px;
            font-size: 18px;
            font-weight: 700;
            color: var(--text-dim);
            cursor: pointer;
            transition: 0.3s;
            position: relative;
        }

        .tab-btn.active {
            color: var(--primary-orange);
        }

        .tab-btn.active::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 10%;
            right: 10%;
            height: 3px;
            background: var(--primary-orange);
            border-radius: 10px;
        }

        .auth-form {
            display: none;
        }

        .auth-form.active {
            display: block;
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .form-group {
            margin-bottom: 22px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 700;
            color: #475569;
            margin-bottom: 8px;
            padding-left: 5px;
        }

        .form-group input {
            width: 100%;
            padding: 18px 22px;
            background: #f9fafb;
            border: 1px solid #f1f5f9;
            border-radius: 20px;
            font-size: 15px;
            font-weight: 500;
            color: var(--text-main);
            transition: 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary-orange);
            background: white;
            box-shadow: 0 0 0 4px rgba(255, 140, 0, 0.05);
        }

        .forgot-link {
            display: block;
            text-align: right;
            color: #3b82f6;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            margin-top: -5px;
            margin-bottom: 25px;
        }

        .submit-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(90deg, #ff8c00, #ff3d00);
            border: none;
            border-radius: 20px;
            color: white;
            font-size: 17px;
            font-weight: 800;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(255, 140, 0, 0.25);
            transition: 0.3s;
            margin-bottom: 25px;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(255, 140, 0, 0.35);
        }

        .divider {
            position: relative;
            text-align: center;
            margin-bottom: 25px;
        }

        .divider::before {
            content: '';
            position: absolute;
            left: 0; top: 50%;
            width: 100%; height: 1px;
            background: #f1f5f9;
        }

        .divider span {
            background: white;
            padding: 0 15px;
            font-size: 13px;
            color: var(--text-dim);
            font-weight: 600;
            position: relative;
        }

        .social-section {
            display: flex;
            justify-content: center;
        }

        #googleButtonDiv {
            width: 40px !important;
            height: 40px !important;
            border-radius: 50% !important;
            overflow: hidden !important;
            border: 1px solid #f1f5f9 !important;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05) !important;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Mobile specific adjustments */
        @media (max-width: 480px) {
            .auth-card {
                padding: 30px 20px;
                border-radius: 0;
                margin: 0;
                height: 100vh;
                display: flex;
                flex-direction: column;
                justify-content: center;
            }
            body { background: white; }
        }
    </style>
</head>

<body>
    <div class="auth-card">
        <div class="top-accent"></div>

        <div class="logo-section">
            <div class="logo-pill">
                <h1>CrewCanvas</h1>
                <p>Where all crafts connect</p>
            </div>
        </div>

        <div class="auth-tabs">
            <button id="loginTabBtn" class="tab-btn active" onclick="toggleAuth('login')">Login</button>
            <button id="signupTabBtn" class="tab-btn" onclick="toggleAuth('signup')">Sign Up</button>
        </div>

        <!-- Login Form -->
        <form id="loginForm" class="auth-form active" onsubmit="handleLoginSubmit(event)">
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="loginEmail" placeholder="Enter your email" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="loginPassword" placeholder="Enter your password" required>
            </div>
            <a href="forgot-password.html" class="forgot-link">Forgot password?</a>
            <button type="submit" class="submit-btn">Login</button>
        </form>

        <!-- Signup Form -->
        <form id="signupForm" class="auth-form" onsubmit="handleSignupSubmit(event)">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="signupName" placeholder="Enter your full name" required>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="signupEmail" placeholder="Enter your email" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="signupPassword" placeholder="Minimum 6 characters" required>
            </div>
            <div class="form-group">
                <label>Confirm Password</label>
                <input type="password" id="confirmPassword" placeholder="Repeat password" required>
            </div>
            <button type="submit" class="submit-btn">Create Your Legacy</button>
        </form>

        <div class="divider">
            <span>Or login with</span>
        </div>

        <div class="social-section">
            <div id="googleButtonDiv"></div>
        </div>
    </div>

    <script src="js/utils.js?v=1.2"></script>
    <script src="js/auth.js?v=1.1"></script>
    <script>
        function toggleAuth(mode) {
            const loginForm = document.getElementById('loginForm');
            const signupForm = document.getElementById('signupForm');
            const loginBtn = document.getElementById('loginTabBtn');
            const signupBtn = document.getElementById('signupTabBtn');

            if (mode === 'login') {
                loginForm.classList.add('active');
                signupForm.classList.remove('active');
                loginBtn.classList.add('active');
                signupBtn.classList.remove('active');
            } else {
                signupForm.classList.add('active');
                loginForm.classList.remove('active');
                signupBtn.classList.add('active');
                loginBtn.classList.remove('active');
            }
        }

        async function handleLoginSubmit(e) {
            e.preventDefault();
            if (typeof login === 'function') {
                login(e);
            }
        }

        async function handleSignupSubmit(e) {
            e.preventDefault();
            if (typeof register === 'function') {
                register(e);
            }
        }
    </script>
</body>

</html>
