<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CrewCanvas - Film Industry Connection Platform</title>
    <link rel="stylesheet" href="styles/auth.css?v=2.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
    <div class="login-bg"></div>
    <div class="login-overlay"></div>
    <div class="login-card">
        <div class="login-header">
            <div class="logo-pill">
                <div class="logo-text">
                    <h1>
                        <span class="c-letter">C</span><span class="remaining-letters">rew</span>
                        <span class="c-letter">C</span><span class="remaining-letters">anvas</span>
                    </h1>
                    <p class="logo-caption logo-orange-caption">Where all crafts connect</p>
                </div>
            </div>
        </div>
        <div class="login-tabs">
            <button class="tab-btn active" data-tab="login">Login</button>
            <button class="tab-btn" data-tab="signup">Sign Up</button>
        </div>
        <form id="loginForm" class="login-form active">
            <label for="loginEmail">Email</label>
            <input type="email" id="loginEmail" placeholder="Enter your email" required>
            <label for="loginPassword">Password</label>
            <input type="password" id="loginPassword" placeholder="Enter your password" required>
            <div class="login-form-row">
                <a href="#" class="forgot-password">Forgot password?</a>
            </div>
            <button type="submit" class="login-btn">Login</button>
            <div class="login-divider"><span>Or login with</span></div>
            <div class="login-social">
                <button type="button" class="social-btn social-google"><i class="fab fa-google"></i></button>
            </div>
        </form>
        <form id="signupForm" class="login-form">
            <label for="signupName">Full Name</label>
            <input type="text" id="signupName" placeholder="Enter your name" required>
            <label for="signupEmail">Email</label>
            <input type="email" id="signupEmail" placeholder="Enter your email" required>
            <label for="signupPassword">Password</label>
            <input type="password" id="signupPassword" placeholder="Enter your password" required>
            <label for="confirmPassword">Confirm Password</label>
            <input type="password" id="confirmPassword" placeholder="Confirm your password" required>
            <button type="submit" class="login-btn">Sign Up</button>
            <div style="text-align: center; margin-top: 10px;">
                <button type="button" id="devBypassBtn" style="background: none; border: none; color: #888; cursor: pointer; font-size: 0.8rem; text-decoration: underline;">Dev: Bypass Login</button>
            </div>
        </form>
    </div>
    <script src="js/authUtils.js"></script>
    <script>
        // Handle redirect parameter from URL
        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const redirectUrl = urlParams.get('redirect');
            if (redirectUrl) {
                localStorage.setItem('redirectAfterLogin', redirectUrl);
            }
        });
        
        // Add showMessage function
        function showMessage(message, type) {
            console.log(`${type.toUpperCase()} message:`, message);
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${type}`;
            messageDiv.textContent = message;
            
            document.body.appendChild(messageDiv);
            
            setTimeout(() => {
                messageDiv.remove();
            }, 3000);
        }
        
        // Tab switching
        document.querySelectorAll('.tab-btn').forEach(button => {
            button.addEventListener('click', () => {
                document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
                document.querySelectorAll('.login-form').forEach(form => form.classList.remove('active'));
                button.classList.add('active');
                document.getElementById(`${button.dataset.tab}Form`).classList.add('active');
            });
        });
        // Login
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            try {
                await window.AuthUtils.handleLogin(email, password);
            } catch (error) {
                showMessage(error.message || 'Login failed. Please try again.', 'error');
            }
        });
        // Signup
        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('signupName').value;
            const email = document.getElementById('signupEmail').value;
            const password = document.getElementById('signupPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            if (password !== confirmPassword) {
                showMessage('Passwords do not match', 'error');
                return;
            }
            try {
                await window.AuthUtils.handleSignup(name, email, password);
            } catch (error) {
                showMessage(error.message || 'Signup failed. Please try again.', 'error');
            }
        });
        // Social login (Google example)
        document.querySelector('.social-google').addEventListener('click', (e) => {
            e.preventDefault();
            window.AuthUtils.handleGoogleLogin();
        });

        // Dev Bypass logic
        document.getElementById('devBypassBtn').addEventListener('click', () => {
            const mockUser = {"id":1, "name":"Test User", "email":"test@example.com", "picture":"/images/profile.jpg"};
            const mockToken = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJ1c2VyIjp7ImlkIjoxLCJlbWFpbCI6InRlc3RAZXhhbXBsZS5jb20ifSwiaWF0IjoxNzc2MDU0ODU3LCJleHAiOjE3NzYxNDEyNTd9.dummy";
            localStorage.setItem('token', mockToken);
            localStorage.setItem('user', JSON.stringify(mockUser));
            localStorage.setItem('userName', mockUser.name);
            window.location.href = 'home.html';
        });
    </script>
</body>
</html>
