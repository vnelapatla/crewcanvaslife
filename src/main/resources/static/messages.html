<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messages | CrewCanvas</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/messages.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .bottom-nav {
            position: fixed !important;
            bottom: 0 !important;
            left: 0 !important;
            width: 100% !important;
            height: 70px !important;
            background: #000 !important;
            display: flex !important;
            justify-content: space-around !important;
            align-items: center !important;
            z-index: 99999 !important;
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        .bottom-nav .nav-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #888;
            text-decoration: none;
            font-size: 10px;
        }
        .bottom-nav .nav-item.active {
            color: #ff8c00 !important;
        }
        .bottom-nav .nav-item .icon {
            font-size: 22px;
            margin-bottom: 2px;
        }
        @media (min-width: 1025px) {
            .bottom-nav { display: none !important; }
        }
        .content-body {
            padding-bottom: 100px !important;
        }
    </style>
</head>
<body class="messages-page">
    <div class="app-layout">
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <div class="brand">
                <h2 style="color: var(--primary-orange);">CrewCanvas</h2>
                <p>Where all crafts connect</p>
            </div>
            <nav class="nav-menu">
                <a href="feed.html" class="nav-item">
                    <span class="icon">📰</span> Feed
                </a>
                <a href="home.html" class="nav-item">
                    <span class="icon">🏠</span> Dashboard
                </a>
                <a href="crew-search.html" class="nav-item">
                    <span class="icon">🔍</span> Crew Search
                </a>
                <a href="messages.html" class="nav-item active">
                    <span class="icon">💬</span> Messages
                </a>
                <a href="launch-audition.html" class="nav-item">
                    <span class="icon">🎬</span> Events
                </a>
            </nav>
        </aside>

        <!-- Main Content Wrapper -->
        <div class="main-wrapper">
            <!-- Top Cinematic Header -->
            <header class="top-header">
                <div class="cinematic-banner"></div>
                <div class="header-right">
                    <div class="notification-bell">
                        <i class="fa-solid fa-bell"></i>
                    </div>
                        <div class="user-profile-box" onclick="ProfileHandler.toggleProfileDropdown()">
                            <div class="user-avatar-small" id="userAvatarSmall" style="width: 32px; height: 32px; border-radius: 50%; overflow: hidden; background: linear-gradient(135deg, #ff8c00, #ff4c3b); color: #fff; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 13px;">
                                <img src="" alt="" id="userAvatarImg" style="display:none; width: 100%; height: 100%; object-fit: cover;">
                                <span id="userInitialsSmall">U</span>
                            </div>
                            <span id="userNameHeader" style="font-size: 14px; font-weight: 700; color: #333; margin-left: 10px;">User</span>
                            <span class="chevron-down" style="font-size: 10px; opacity: 0.4; margin-left: 5px;">▼</span>
                            <div class="profile-dropdown-menu" id="profileDropdown">
                                <a href="profile.html" class="dropdown-item profile-link"><i class="fa-solid fa-user"></i> My Profile</a>
                                <a href="edit-profile.html" class="dropdown-item edit-link"><i class="fa-solid fa-file-pen"></i> Edit Profile</a>
                                <a href="settings.html" class="dropdown-item settings-link"><i class="fa-solid fa-gear"></i> Settings</a>
                                <div class="dropdown-divider"></div>
                                <a href="#" onclick="logout()" class="dropdown-item logout-link"><i class="fa-solid fa-right-from-bracket"></i> Logout</a>
                            </div>
                        </div>
                </div>
            </header>
            <style>
                .profile-dropdown-menu.active { display: flex !important; }
                .user-profile-box { cursor: pointer; }
            </style>

            <!-- Messaging View -->
            <main class="content-body" id="messagingView">
                <div class="messages-card">
                    <!-- Search Header -->
                    <div class="search-section">
                        <div class="search-bar">
                            <i class="fa-solid fa-magnifying-glass"></i>
                            <input type="text" id="searchConversations" placeholder="Search conversations..." oninput="searchConversations()">
                        </div>
                    </div>

                    <!-- Connection Stats -->
                    <div class="connection-stats">
                        <div class="stat-pill" onclick="switchSidebarTab('following')">
                            <i class="fa-solid fa-user-plus"></i>
                            <span id="followingCount">0 Following</span>
                        </div>
                        <div class="stat-pill">
                            <i class="fa-solid fa-heart"></i>
                            <span id="followerCount">0 Followers</span>
                        </div>
                        <div class="stat-pill">
                            <i class="fa-solid fa-users"></i>
                            <span id="mutualCount">0 Mutual</span>
                        </div>
                    </div>

                    <!-- User Lists (Conversations by default) -->
                    <div class="lists-wrapper">
                        <!-- Switch Tabs -->
                        <div class="list-tabs">
                            <button class="active" onclick="switchSidebarTab('conversations')">Recent Chats</button>
                            <button onclick="switchSidebarTab('following')">Connections</button>
                        </div>

                        <div id="conversationsList" class="user-list">
                            <!-- Injected by JS -->
                            <div class="loading-state">Loading your conversations...</div>
                        </div>

                        <div id="followingList" class="user-list" style="display: none;">
                            <!-- Injected by JS -->
                        </div>
                    </div>
                </div>
            </main>

            <!-- Chat Modal / Fullscreen Panel (Hidden by default) -->
            <div id="chatOverlay" class="chat-overlay" style="display: none;">
                <div class="chat-window">
                    <header class="chat-header">
                        <div class="chat-user">
                            <button class="back-btn" onclick="closeChatArea()"><i class="fa-solid fa-arrow-left"></i></button>
                            <div id="chatUserAvatar" class="initials-avatar"></div>
                            <div class="user-info">
                                <h4 id="chatUserName">User Name</h4>
                                <span id="chatUserStatus">active now</span>
                            </div>
                        </div>
                        <div class="chat-actions">
                            <i class="fa-solid fa-phone"></i>
                            <i class="fa-solid fa-video"></i>
                            <i class="fa-solid fa-xmark" onclick="closeChatArea()"></i>
                        </div>
                    </header>
                    <div id="messagesArea" class="messages-container"></div>
                    <div class="chat-input-area">
                        <div class="input-actions">
                            <i class="fa-regular fa-face-smile"></i>
                            <i class="fa-solid fa-plus"></i>
                        </div>
                        <input type="text" id="messageInput" placeholder="Type a message..." onkeypress="handleEnter(event)">
                        <button onclick="sendMessage()" class="send-btn"><i class="fa-solid fa-paper-plane"></i></button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Universal Bottom Navigation (Mobile) -->
    <div class="bottom-nav">
        <a href="feed.html" class="nav-item">
            <span class="icon">📰</span> <span>Feed</span>
        </a>
        <a href="home.html" class="nav-item">
            <span class="icon">🏠</span> <span>Dashboard</span>
        </a>
        <a href="crew-search.html" class="nav-item">
            <span class="icon">🔍</span> <span>Crew Search</span>
        </a>
        <a href="messages.html" class="nav-item active">
            <span class="icon">💬</span> <span>Messages</span>
        </a>
        <a href="launch-audition.html" class="nav-item">
            <span class="icon">🎬</span> <span>Events</span>
        </a>
    </div>

    <!-- WebSocket Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.6.1/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/profile-handler.js"></script>
    <script src="js/advanced-messaging.js"></script>
    <script src="js/messages.js"></script>
</body>
</html>
