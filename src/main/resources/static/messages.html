<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messages | CrewCanvas</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/main.css?v=2.5">
    <link rel="stylesheet" href="css/messages.css?v=3.1">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>

        .content-body {
            padding-bottom: 100px !important;
        }
        #chatUserName {
            text-transform: capitalize !important;
            margin: 0 !important;
        }
        .user-info {
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-width: 0;
            flex: 1;
            margin: 0 !important;
            line-height: 1.1 !important;
        }
        .desktop-hidden {
            display: none !important;
        }
        @media (max-width: 1024px) {
            .desktop-hidden {
                display: block !important;
            }
        }
    </style>
</head>
<body class="messages-page">
    <div class="app-layout">
        <!-- Sidebar Navigation is dynamically injected by utils.js -->

        <!-- Main Content Wrapper -->
        <div class="main-wrapper">
            <!-- Header -->
            <header class="top-header"></header>
            <style>
                .profile-dropdown-menu.active { display: flex !important; }
                .user-profile-box { cursor: pointer; }
            </style>

            <!-- Messaging View -->
            <main class="content-body" id="messagingView">
                <div class="messages-card">
                    <!-- Search Header -->
                    <div class="search-section">
                        <div class="search-bar">
                            <i class="fa-solid fa-magnifying-glass"></i>
                            <input type="text" id="searchConversations" placeholder="Search conversations..." oninput="searchConversations()" onkeydown="if(event.key === 'Enter') searchConversations()">
                        </div>
                    </div>

                    <!-- Connection Stats -->
                    <div class="connection-stats">
                        <div class="stat-pill" onclick="filterConnections('followers')">
                            <i class="fa-solid fa-heart"></i>
                            <span id="followerCount">0 Followers</span>
                        </div>
                        <div class="stat-pill" onclick="filterConnections('mutual')">
                            <i class="fa-solid fa-users"></i>
                            <span id="mutualCount">0 Mutual</span>
                        </div>
                    </div>

                    <!-- User Lists (Conversations by default) -->
                    <div class="lists-wrapper">
                        <!-- Switch Tabs -->
                        <div class="list-tabs">
                            <button class="active" onclick="switchSidebarTab('conversations')">Recent Chats</button>
                            <button onclick="switchSidebarTab('followers')">Contacts</button>
                        </div>

                        <div id="conversationsList" class="user-list">
                            <!-- Injected by JS -->
                            <div class="loading-state">Loading your conversations...</div>
                        </div>

                        <div id="followingList" class="user-list" style="display: none;">
                            <!-- Injected by JS -->
                        </div>
                    </div>
                </div>
            </main>

        </div>
        
        <!-- Chat Modal / Fullscreen Panel (Hidden by default) -->
        <div id="chatOverlay" class="chat-overlay" style="display: none;">
            <div class="chat-window">
                <header class="chat-header">
                    <div class="chat-user">
                        <button class="back-btn desktop-hidden" onclick="closeChatArea()"><i class="fa-solid fa-arrow-left"></i></button>
                        <div id="chatUserAvatar" class="initials-avatar"></div>
                        <div class="user-info">
                            <h4 id="chatUserName">User Name</h4>
                            <span id="chatUserStatus">active now</span>
                        </div>
                    </div>
                    <div class="chat-actions">
                        <i class="fa-solid fa-xmark" onclick="closeChatArea()" style="cursor: pointer;"></i>
                    </div>
                </header>
                <div id="messagesArea" class="messages-container"></div>
                <div id="previewArea" class="chat-preview-area" style="display: none; padding: 10px 20px; background: #fff; border-top: 1px solid #eee; align-items: center; gap: 15px;">
                    <!-- Injected by JS -->
                </div>
                <div class="chat-input-area">
                    <div class="input-actions">
                        <i class="fa-regular fa-face-smile" id="emojiBtn" style="cursor: pointer;"></i>
                        <label for="messageImage" style="cursor: pointer; margin: 0;">
                            <i class="fa-solid fa-image"></i>
                        </label>
                        <input type="file" id="messageImage" accept="image/*,video/*" multiple style="display: none;">
                        
                        <label for="messageFile" style="cursor: pointer; margin: 0;">
                            <i class="fa-solid fa-paperclip"></i>
                        </label>
                        <input type="file" id="messageFile" accept=".pdf,.doc,.docx,.xls,.xlsx,.txt,.zip,.rar,.mp4,.mov,.avi,.mp3,.wav" multiple style="display: none;">
                    </div>
                    <input type="text" id="messageInput" placeholder="Type a message..." onkeydown="handleEnter(event)">
                    <button onclick="sendMessage()" class="send-btn"><i class="fa-solid fa-paper-plane"></i></button>
                </div>
            </div>
        </div>
    </main>



    <!-- WebSocket Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.6.1/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
    <script src="js/utils.js?v=2.4"></script>
    <script src="js/profile-handler.js?v=2.4"></script>
    <script src="js/advanced-messaging.js?v=2.4"></script>
    <script src="js/messages.js?v=2.6"></script>

    <!-- Premium Message Options Bottom Sheet (Mobile) -->
    <div id="bottomSheetOverlay" class="bottom-sheet-overlay" onclick="closeBottomSheet()"></div>
    <div id="messageOptionsBottomSheet" class="bottom-sheet">
        <div class="bottom-sheet-handle"></div>
        <div class="bottom-sheet-header">
            <h3>Message Options</h3>
            <button class="close-sheet" onclick="closeBottomSheet()">&times;</button>
        </div>
        <div class="bottom-sheet-content">
            <div id="sheetEditBtn" class="sheet-item" onclick="handleSheetAction('edit')">
                <i class="fa-solid fa-pen"></i>
                <span>Edit Message</span>
            </div>
            <div class="sheet-item" onclick="handleSheetAction('copy')">
                <i class="fa-solid fa-copy"></i>
                <span>Copy Text</span>
            </div>
            <div id="sheetDeleteBtn" class="sheet-item delete" onclick="handleSheetAction('delete')" style="color: #f44336;">
                <i class="fa-solid fa-trash"></i>
                <span>Delete Message</span>
            </div>
        </div>
    </div>
</body>
</html>
