<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Casting Deck | CrewCanvas</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/main.css">
    <style>
        :root {
            --bg-light: #ffffff;
            --bg-subtle: #f1f5f9;
            --primary-orange: #ff8c00;
            --text-main: #020617;
            --text-muted: #475569;
            --border-color: #e2e8f0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-light);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        /* Editorial Header Section */
        .hero-section {
            padding: 100px 20px 80px;
            text-align: center;
            background: #fff;
        }

        .brand-header h2 {
            font-size: 14px;
            letter-spacing: 6px;
            color: var(--primary-orange);
            text-transform: uppercase;
            margin-bottom: 20px;
            font-weight: 800;
        }

        .brand-header h1 {
            font-size: 72px;
            margin: 0;
            font-weight: 900;
            color: var(--text-main);
            line-height: 1;
            letter-spacing: -2px;
        }

        .deck-container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 0 60px 100px;
        }

        .event-banner {
            width: 100%;
            height: 600px;
            border-radius: 32px;
            overflow: hidden;
            position: relative;
            margin-bottom: 100px;
            box-shadow: 0 50px 100px rgba(0,0,0,0.1);
        }

        .event-banner img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .banner-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 80px;
            background: linear-gradient(transparent, rgba(0,0,0,0.8));
            color: white;
        }

        .banner-overlay h1 {
            font-size: 64px;
            margin: 0 0 20px;
            font-weight: 900;
        }

        .event-meta {
            display: flex;
            gap: 30px;
            font-size: 18px;
            font-weight: 600;
        }

        .event-meta span {
            background: rgba(255,255,255,0.2);
            padding: 12px 28px;
            border-radius: 100px;
            backdrop-filter: blur(10px);
        }

        /* Talent Grid */
        .grid-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 60px;
            padding-bottom: 30px;
            border-bottom: 4px solid var(--text-main);
        }

        .grid-header h2 {
            font-size: 42px;
            font-weight: 900;
            margin: 0;
        }

        .deck-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
            gap: 60px;
        }

        .talent-card {
            cursor: pointer;
            transition: transform 0.4s ease;
        }

        .talent-card:hover {
            transform: translateY(-15px);
        }

        .talent-image {
            width: 100%;
            aspect-ratio: 1;
            border-radius: 24px;
            overflow: hidden;
            margin-bottom: 25px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.05);
        }

        .talent-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .talent-info h3 {
            font-size: 32px;
            margin: 0;
            font-weight: 900;
        }

        .talent-info p {
            font-size: 16px;
            color: var(--primary-orange);
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 5px;
        }

        /* FULL SCREEN MODAL REDESIGN */
        .talent-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #fff;
            z-index: 10000;
            display: none;
            overflow-y: auto;
        }

        .modal-container {
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
            padding: 100px 40px;
            position: relative;
        }

        .close-modal-large {
            position: fixed;
            top: 40px;
            right: 40px;
            width: 60px;
            height: 60px;
            background: var(--bg-subtle);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 10001;
            font-size: 24px;
            transition: 0.3s;
        }

        .close-modal-large:hover {
            background: var(--text-main);
            color: #fff;
            transform: rotate(90deg);
        }

        .modal-hero {
            display: grid;
            grid-template-columns: 450px 1fr;
            gap: 100px;
            margin-bottom: 120px;
            align-items: center;
        }

        .modal-hero-img {
            width: 100%;
            max-width: 450px;
            aspect-ratio: 3/4;
            border-radius: 40px;
            overflow: hidden;
            box-shadow: 0 40px 80px rgba(0,0,0,0.1);
        }

        .modal-hero-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .modal-hero-content h1 {
            font-size: 100px;
            margin: 0;
            font-weight: 900;
            line-height: 0.9;
            letter-spacing: -4px;
        }

        .modal-hero-content .role {
            font-size: 20px;
            color: var(--primary-orange);
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 5px;
            margin-top: 20px;
            display: block;
        }

        .modal-gallery-large {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 30px;
            margin-bottom: 120px;
        }

        .gallery-item-large {
            width: 100%;
            aspect-ratio: 4/5;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.05);
        }

        .gallery-item-large img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .details-section-large {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 100px;
            padding: 100px 0;
            border-top: 1px solid var(--border-color);
        }

        .stats-grid-large {
            display: grid;
            gap: 40px;
        }

        .stat-item-large span {
            display: block;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--text-muted);
            margin-bottom: 10px;
            font-weight: 700;
        }

        .stat-item-large b {
            font-size: 32px;
            font-weight: 900;
        }

        .narrative-large h3 {
            font-size: 18px;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 30px;
            border-bottom: 2px solid var(--text-main);
            padding-bottom: 15px;
        }

        .narrative-large p {
            font-size: 24px;
            line-height: 1.6;
            color: var(--text-muted);
            font-weight: 500;
        }

        .action-bar-large {
            display: flex;
            gap: 30px;
            margin-top: 60px;
        }

        .btn-large {
            flex: 1;
            padding: 30px;
            border-radius: 20px;
            font-size: 18px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            transition: 0.3s;
        }

        .btn-black {
            background: var(--text-main);
            color: #fff;
        }

        .btn-outline {
            border: 3px solid var(--text-main);
            color: var(--text-main);
        }

        .btn-large:hover {
            transform: scale(1.02);
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }

        @media (max-width: 1024px) {
            .hero-section { padding: 60px 20px 40px; }
            .brand-header h1 { font-size: 42px; }
            .brand-header h2 { letter-spacing: 3px; }

            .modal-container { 
                padding: 80px 20px 40px; 
                display: flex;
                flex-direction: column;
            }

            .modal-hero { 
                display: contents; /* Allow children to be siblings for ordering */
            }

            .modal-hero-img { 
                max-width: 100%; 
                border-radius: 20px; 
                order: 1; 
                margin-bottom: 20px;
            }

            .modal-gallery-large { 
                grid-template-columns: 1fr; 
                gap: 20px; 
                margin-bottom: 40px;
                order: 2;
                display: flex;
                flex-direction: column;
            }

            .action-bar-large {
                order: 3;
                flex-direction: column;
                gap: 15px;
                margin-bottom: 40px;
                width: 100%;
            }
            
            .modal-hero-content { 
                order: 4; 
                text-align: left;
                margin-bottom: 40px;
            }
            .modal-hero-content h1 { font-size: 48px; letter-spacing: -2px; }
            .modal-hero-content h2 { font-size: 24px !important; }

            .details-section-large { 
                grid-template-columns: 1fr; 
                gap: 40px; 
                padding: 40px 0;
                order: 5;
            }
            
            .btn-large { padding: 20px; font-size: 16px; width: 100%; box-sizing: border-box; }
            .close-modal-large { top: 20px; right: 20px; width: 44px; height: 44px; font-size: 18px; }
            
            .stat-item-large b { font-size: 24px; }
            .narrative-large p { font-size: 18px; }

            .deck-grid { grid-template-columns: 1fr; gap: 30px; }
            .deck-container { padding: 0 20px 60px; }
            .event-banner { height: 250px; margin-bottom: 40px; border-radius: 20px; }
            .banner-overlay { padding: 20px; }
            .banner-overlay h1 { font-size: 28px; }
            .grid-header h2 { font-size: 28px; }
        }

        @media (max-width: 600px) {
            .event-meta { gap: 10px; flex-wrap: wrap; }
            .event-meta span { font-size: 12px; padding: 8px 16px; }
        }

        .sidebar, .top-header, .bottom-nav, .sidebar-overlay {
            display: none !important;
        }

        body.with-sidebar .main-content, 
        body.with-sidebar .main-wrapper,
        body {
            margin-left: 0 !important;
            width: 100% !important;
        }

        @media (min-width: 1025px) {
            body.with-sidebar .main-content, 
            body.with-sidebar .main-wrapper {
                margin-left: 0 !important;
                width: 100% !important;
            }
        }
    </style>
</head>
<body>
    <section class="hero-section">
        <div class="brand-header">
            <h2>Premium Discovery</h2>
            <h1>CrewCanvas Casting Deck</h1>
        </div>
    </section>

    <div class="deck-container">
        <div id="eventBanner" class="event-banner">
            <!-- Loaded via JS -->
        </div>

        <div class="grid-header">
            <h2>Candidates Spotlight</h2>
            <div id="candidateCount" style="color: #94a3b8; font-weight: 600;">-</div>
        </div>

        <div id="deckGrid" class="deck-grid">
            <!-- Talent cards loaded here -->
        </div>
    </div>

    <!-- Talent Full-Screen Profile Overlay -->
    <div id="talentModal" class="talent-modal">
        <span class="close-modal-large" onclick="closeModal()">✕</span>
        
        <div class="modal-container">
            <!-- Hero Section -->
            <div class="modal-hero">
                <div class="modal-hero-img">
                    <img id="modalMainImg" src="" alt="">
                </div>
                <div class="modal-hero-content">
                    <h2 id="modalName" style="font-size: 32px; color: var(--text-main); margin: 0 0 10px; font-weight: 800; font-family: 'Outfit';">Talent Name</h2>
                    <h1 id="modalRole">Professional Role</h1>
                    
                    <div style="margin-top: 20px; display: flex; gap: 20px; align-items: center;">
                        <div class="stat-item-large" style="margin: 0;">
                            <span>Contact</span>
                            <b id="modalPhone" style="font-size: 24px; color: var(--primary-orange);">-</b>
                        </div>
                    </div>
                    
                    <div class="action-bar-large">
                        <a id="modalVideoBtn" href="#" target="_blank" class="btn-large btn-black">
                            <i class="fas fa-play"></i> Performance Tape
                        </a>
                        <a id="modalResumeBtn" href="#" target="_blank" class="btn-large btn-outline">
                            <i class="fas fa-file-pdf"></i> Portfolio / Resume
                        </a>
                    </div>
                </div>
            </div>

            <!-- Large Gallery -->
            <div id="modalGalleryLarge" class="modal-gallery-large">
                <!-- Additional photos loaded here -->
            </div>

            <!-- Details Section -->
            <div class="details-section-large">
                <div class="stats-grid-large">
                    <div class="stat-item-large">
                        <span>Age Range</span>
                        <b id="modalAge">-</b>
                    </div>
                    <div class="stat-item-large">
                        <span>Height (ft)</span>
                        <b id="modalHeight">-</b>
                    </div>
                    <div class="stat-item-large">
                        <span>Location</span>
                        <b id="modalLocation">-</b>
                    </div>
                </div>
                <div class="narrative-large">
                    <h3>Candidate Narrative</h3>
                    <p id="modalBio">No narrative provided.</p>
                    
                    <h3 style="margin-top: 60px;">Professional Background</h3>
                    <p id="modalExp" style="font-size: 18px;">Detailed experience not listed.</p>
                </div>
            </div>
        </div>
    </div>

    <script src="js/utils.js?v=4.0"></script>
    <script src="js/shared-audition.js?v=4.0"></script>
</body>
</html>
