<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Events - CrewCanvas</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/events.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>
    <!-- Sidebar (Desktop) -->
    <aside class="sidebar">
        <div class="brand">
            <h2>CrewCanvas</h2>
            <p>Where all crafts connect</p>
        </div>
        <nav class="nav-menu">
            <a href="feed.html" class="nav-item">
                <span class="icon">📰</span> Feed
            </a>
            <a href="home.html" class="nav-item">
                <span class="icon">🏠</span> Dashboard
            </a>
            <a href="crew-search.html" class="nav-item">
                <span class="icon">🔍</span> Crew Search
            </a>
            <a href="messages.html" class="nav-item">
                <span class="icon">💬</span> Messages
            </a>
            <a href="launch-audition.html" class="nav-item active">
                <span class="icon">🎬</span> Events
            </a>
        </nav>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <!-- Top Header -->
        <header class="top-header">
            <div class="status-bar">
                <button class="btn-primary" style="padding: 10px 20px; border-radius: 12px; margin-right: 20px;" onclick="window.location.href='launch-audition.html'">+ Create New Event</button>
                <div class="user-profile-box" onclick="ProfileHandler.toggleProfileDropdown()">
                    <div class="user-avatar-small" id="userAvatarSmall" style="width: 32px; height: 32px; border-radius: 50%; overflow: hidden; background: linear-gradient(135deg, #ff8c00, #ff4c3b); color: #fff; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 13px;">
                        <img src="" alt="" id="userAvatarImg" style="display:none; width: 100%; height: 100%; object-fit: cover;">
                        <span id="userInitialsSmall">U</span>
                    </div>
                    <span id="userNameHeader" style="font-size: 14px; font-weight: 700; color: #333; margin-left: 10px;">User</span>
                    <span class="chevron-down" style="font-size: 10px; opacity: 0.4; margin-left: 5px;">▼</span>
                    <div class="profile-dropdown-menu" id="profileDropdown">
                        <a href="profile.html" class="dropdown-item profile-link"><i class="fa-solid fa-user"></i> My Profile</a>
                        <a href="edit-profile.html" class="dropdown-item edit-link"><i class="fa-solid fa-file-pen"></i> Edit Profile</a>
                        <a href="settings.html" class="dropdown-item settings-link"><i class="fa-solid fa-gear"></i> Settings</a>
                        <div class="dropdown-divider"></div>
                        <a href="#" onclick="logout()" class="dropdown-item logout-link"><i class="fa-solid fa-right-from-bracket"></i> Logout</a>
                    </div>
                </div>
            </div>
        </header>

        <div class="content-body">
            <h2 class="section-title">My Events Dashboard</h2>

        <!-- My Events List -->
        <div id="myEventsContainer">
            <!-- Events will be loaded here -->
        </div>
    </div>

    <script src="js/utils.js"></script>
    <script src="js/profile-handler.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            checkAuth();
            const userId = getCurrentUserId();

            try {
                const response = await fetch(`${API_BASE_URL}/api/events/user/${userId}`);
                const events = await response.json();

                const container = document.getElementById('myEventsContainer');

                if (events.length === 0) {
                    container.innerHTML = '<div class="card text-center"><p>You haven\'t created any events yet.</p><button class="btn-primary" onclick="window.location.href=\'launch-audition.html\'">Create Your First Event</button></div>';
                    return;
                }

                container.innerHTML = events.map(event => `
                    <div class="card mb-2">
                        <div style="display: flex; justify-content: space-between; align-items: start;">
                            <div style="flex: 1;">
                                <h3>${event.title}</h3>
                                <p><strong>Type:</strong> ${event.eventType}</p>
                                <p><strong>Date:</strong> ${event.date} ${event.time || ''}</p>
                                <p><strong>Location:</strong> ${event.location}</p>
                                <p><strong>Applicants:</strong> ${event.applicants || 0}</p>
                                <p>${event.description || ''}</p>
                            </div>
                            <div style="display: flex; flex-direction: column; gap: 8px;">
                                <button class="btn-primary" onclick="window.location.href='event-management.html?id=${event.id}'">Manage Applications</button>
                                <button class="btn-secondary" onclick="window.location.href='form-builder.html?id=${event.id}'">Modify Registration Form</button>
                                <div style="display: flex; gap: 8px;">
                                    <button class="btn-danger" style="flex:1" onclick="deleteEvent(${event.id})">Delete</button>
                                </div>
                            </div>
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                console.error('Error loading events:', error);
            }
        });

        async function deleteEvent(id) {
            if (!confirm('Are you sure you want to delete this event?')) return;

            try {
                await fetch(`${API_BASE_URL}/api/events/${id}`, { method: 'DELETE' });
                showMessage('Event deleted successfully!', 'success');
                location.reload();
            } catch (error) {
                showMessage('Error deleting event', 'error');
            }
        }

        function editEvent(id) {
            showMessage('Edit functionality coming soon!', 'info');
        }
    </script>
    <style>
        .btn-danger {
            background: #f44336;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
        }
    </style>
</body>

</html>
