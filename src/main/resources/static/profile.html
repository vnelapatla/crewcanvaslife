<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CrewCanvas - My Profile</title>
    <link rel="stylesheet" href="styles/home.css">
    <link rel="stylesheet" href="styles/profile.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="js/profile-handler.js"></script>
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #121212 0%, #000000 100%);
            --accent-gradient: linear-gradient(135deg, #FF8A00 0%, #FF2D55 100%);
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --film-orange: #FF8A00;
            --text-main: #ffffff;
            --text-dim: rgba(255, 255, 255, 0.5);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: #080808;
            color: var(--text-main);
            height: 100vh;
            overflow: hidden;
        }

        .dashboard-container {
            display: flex;
            height: 100vh;
            width: 100%;
        }

        /* Sidebar Styling */
        .sidebar {
            width: 280px;
            background: #0a0a0a;
            border-right: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            padding: 40px 25px;
            flex-shrink: 0;
        }

        .logo h1 {
            font-size: 28px;
            font-weight: 800;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
        }

        .logo-caption {
            font-size: 13px;
            color: var(--text-dim);
            margin-bottom: 50px;
        }

        .nav-menu {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 14px 18px;
            color: var(--text-dim);
            text-decoration: none;
            border-radius: 14px;
            transition: 0.3s;
            font-weight: 500;
        }

        .nav-item:hover {
            background: var(--glass-bg);
            color: var(--text-main);
        }

        /* Main Content */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            background: #080808;
        }

        /* Top Nav */
        .top-nav {
            padding: 20px 40px;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            background: rgba(8, 8, 8, 0.8);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--glass-border);
            z-index: 10;
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 30px;
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
        }

        .user-profile img {
            width: 36px;
            height: 36px;
            border-radius: 50%;
        }

        /* 3-Section Layout */
        .profile-container {
            display: flex;
            flex-direction: column;
            height: 100%;
            flex: 1;
        }

        /* TOP SECTION (50%) */
        .top-section {
            height: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px;
            border-bottom: 1px solid var(--glass-border);
            background: radial-gradient(circle at center, rgba(255, 138, 0, 0.05) 0%, transparent 70%);
        }

        .profile-avatar-large {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid var(--glass-border);
            margin-bottom: 25px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .profile-name-bold {
            font-size: 3.5rem;
            font-weight: 800;
            margin-bottom: 8px;
            letter-spacing: -2px;
            background: linear-gradient(to bottom, #fff 0%, #aaa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .profile-role-small {
            font-size: 1.2rem;
            color: var(--film-orange);
            font-weight: 600;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .profile-location-small {
            color: var(--text-dim);
            font-size: 1rem;
            margin-bottom: 30px;
        }

        .contact-cards-row {
            display: flex;
            gap: 15px;
        }

        .contact-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            padding: 14px 25px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: 0.3s;
        }

        .contact-card:hover {
            transform: translateY(-5px);
            border-color: rgba(255, 138, 0, 0.3);
        }

        .contact-card i {
            color: var(--film-orange);
            font-size: 1.1rem;
        }

        /* BOTTOM SECTION (50%) */
        .bottom-section {
            height: 50%;
            display: flex;
            flex-direction: row;
        }

        /* Movie Projects Split (50%) */
        .movies-split {
            width: 50%;
            height: 100%;
            border-right: 1px solid var(--glass-border);
            padding: 40px;
            overflow-y: auto;
        }

        /* User Posts Split (50%) */
        .posts-split {
            width: 50%;
            height: 100%;
            padding: 40px;
            overflow-y: auto;
            background: rgba(0,0,0,0.1);
        }

        .section-header {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .section-header i {
            color: var(--film-orange);
        }

        /* Grid & Feed Styling */
        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
        }

        .project-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 15px;
            overflow: hidden;
            transition: 0.3s;
        }

        .project-card:hover {
            transform: scale(1.02);
        }

        .project-thumb {
            width: 100%;
            height: 140px;
            object-fit: cover;
        }

        .project-details {
            padding: 15px;
        }

        .project-details h4 {
            font-size: 1rem;
            margin-bottom: 5px;
        }

        .posts-feed {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .post-card-vertical {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 15px;
            padding: 20px;
        }

        .post-card-vertical img.post-media {
            width: 100%;
            border-radius: 10px;
            margin-top: 15px;
            max-height: 350px;
            object-fit: cover;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 5px;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--glass-border);
            border-radius: 10px;
        }

        /* MOBILE RESPONSIVE */
        @media (max-width: 900px) {
            .sidebar { display: none; }
            body { height: auto; overflow: auto; }
            .main-content { height: auto; overflow: visible; }
            .profile-container { height: auto; }
            .top-section { height: auto; padding: 60px 20px; }
            .bottom-section { flex-direction: column; height: auto; }
            .movies-split, .posts-split { width: 100%; height: auto; overflow: visible; padding: 30px 20px; }
            .profile-name-bold { font-size: 2.5rem; }
            .contact-cards-row { flex-direction: column; width: 100%; }
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo">
                <h1>CrewCanvas</h1>
                <p class="logo-caption">Where all crafts connect</p>
            </div>
            <nav class="nav-menu">
                <a href="feed.html" class="nav-item">
                    <i class="fas fa-newspaper"></i>
                    <span>Feed</span>
                </a>
                <a href="home.html" class="nav-item">
                    <i class="fas fa-home"></i>
                    <span>Dashboard</span>
                </a>
                <a href="crew-search.html" class="nav-item">
                    <i class="fas fa-search"></i>
                    <span>Crew Search</span>
                </a>
                <a href="messages.html" class="nav-item">
                    <i class="fas fa-envelope"></i>
                    <span>Messages</span>
                </a>
                <a href="launch-audition.html" class="nav-item">
                    <i class="fas fa-film"></i>
                    <span>Events</span>
                </a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Top Navigation -->
            <nav class="top-nav">
                <div class="nav-right">
                    <div class="notifications">
                        <i class="fas fa-bell"></i>
                    </div>  
                    <div class="user-profile">
                        <img src="https://ui-avatars.com/api/?name=User&background=random" alt="Profile" id="navProfilePic">
                        <span class="user-name"></span>
                        <div class="profile-dropdown">
                            <a href="profile.html" class="dropdown-item"><i class="fas fa-user"></i> My Profile</a>
                            <a href="edit-profile.html" class="dropdown-item"><i class="fas fa-edit"></i> Edit Profile</a>
                            <a href="javascript:void(0)" class="dropdown-item" id="dropdownSettingsBtn"><i class="fas fa-cog"></i> Settings</a>
                            <a href="#" class="dropdown-item" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</a>
                        </div>
                    </div>
                </div>
            </nav>

            <div class="profile-container">
                <!-- TOP SECTION: Profile Information (50% height) -->
                <section class="top-section">
                    <div class="profile-avatar-wrapper">
                        <img src="" alt="Profile" id="profilePicture" class="profile-avatar-large" onerror="this.src='https://ui-avatars.com/api/?name=User&background=FF8A00&color=fff&size=200'">
                    </div>
                    
                    <h1 id="profileName" class="profile-name-bold">Loading Name...</h1>
                    <p id="profileBio" class="profile-role-small">Role</p>
                    <p id="profileLocation" class="profile-location-small">
                        <i class="fas fa-map-marker-alt"></i> Location not specified
                    </p>

                    <div class="contact-cards-row">
                        <div class="contact-card">
                            <i class="fas fa-envelope"></i>
                            <span id="profileEmail">email@example.com</span>
                        </div>
                        <div class="contact-card">
                            <i class="fas fa-phone"></i>
                            <span id="profilePhone">+1 234 567 890</span>
                        </div>
                    </div>

                    <div class="profile-actions" style="margin-top: 30px; display: flex; gap: 15px;">
                        <a href="edit-profile.html" class="action-btn" style="background: var(--accent-gradient); color: white; padding: 12px 25px; border-radius: 12px; text-decoration: none; font-weight: 600;">
                            <i class="fas fa-edit"></i> Edit Profile
                        </a>
                    </div>
                </section>

                <!-- BOTTOM SECTION: Movies & Posts Spilt (50% height) -->
                <section class="bottom-section">
                    <!-- LEFT Split: Movie Projects (50% width) -->
                    <div class="movies-split">
                        <h2 class="section-header"><i class="fas fa-clapperboard"></i> Movie Projects</h2>
                        <div id="projectsGrid" class="projects-grid">
                            <!-- Injected Projects -->
                            <div class="empty-state" id="emptyState">
                                <i class="fas fa-film"></i>
                                <p>Loading projects...</p>
                            </div>
                        </div>
                    </div>

                    <!-- RIGHT Split: Posts (50% width) -->
                    <div class="posts-split">
                        <h2 class="section-header"><i class="fas fa-newspaper"></i> Posts</h2>
                        <div id="postsGrid" class="posts-feed">
                            <!-- Injected Posts -->
                            <div class="empty-state" id="postsEmptyState">
                                <i class="fas fa-edit"></i>
                                <p>Loading posts...</p>
                            </div>
                        </div>
                    </div>
                </section>
            </div>
        </main>

    </div>

    <script>
        const API_BASE_URL = 'https://api.crewcanvas.in';

        // At the top of the script, after defining API_BASE_URL, add this block to show notification on page load if needed
        if (localStorage.getItem('showProjectDeleteSuccess') === '1') {
            let notif = document.createElement('div');
            notif.id = 'customSuccessNotif';
            notif.style.position = 'fixed';
            notif.style.top = '32px';
            notif.style.left = '50%';
            notif.style.transform = 'translateX(-50%)';
            notif.style.background = '#2ecc40';
            notif.style.color = '#fff';
            notif.style.padding = '16px 32px';
            notif.style.borderRadius = '8px';
            notif.style.boxShadow = '0 4px 16px rgba(0,0,0,0.15)';
            notif.style.display = 'flex';
            notif.style.alignItems = 'center';
            notif.style.gap = '12px';
            notif.style.fontSize = '1.1rem';
            notif.style.zIndex = '3000';
            notif.style.opacity = '0';
            notif.style.transition = 'opacity 0.3s';
            notif.innerHTML = '<span style="font-size:1.5rem;">✔️</span> <span>Project deleted successfully!</span>';
            document.body.appendChild(notif);
            setTimeout(() => { notif.style.opacity = '1'; }, 10);
            setTimeout(() => { if (notif) notif.style.opacity = '0'; }, 2000);
            setTimeout(() => { if (notif && notif.style.opacity === '0') notif.remove(); }, 2500);
            localStorage.removeItem('showProjectDeleteSuccess');
        }

        // At the top of the script, after the project delete success message block:
        if (localStorage.getItem('showPostEditSuccess') === '1') {
            let notif = document.createElement('div');
            notif.id = 'customSuccessNotif';
            notif.style.position = 'fixed';
            notif.style.top = '32px';
            notif.style.left = '50%';
            notif.style.transform = 'translateX(-50%)';
            notif.style.background = '#2ecc40';
            notif.style.color = '#fff';
            notif.style.padding = '16px 32px';
            notif.style.borderRadius = '8px';
            notif.style.boxShadow = '0 4px 16px rgba(0,0,0,0.15)';
            notif.style.display = 'flex';
            notif.style.alignItems = 'center';
            notif.style.gap = '12px';
            notif.style.fontSize = '1.1rem';
            notif.style.zIndex = '3000';
            notif.style.opacity = '0';
            notif.style.transition = 'opacity 0.3s';
            notif.innerHTML = '<span style="font-size:1.5rem;">✔️</span> <span>Post updated successfully!</span>';
            document.body.appendChild(notif);
            setTimeout(() => { notif.style.opacity = '1'; }, 10);
            setTimeout(() => { if (notif) notif.style.opacity = '0'; }, 2000);
            setTimeout(() => { if (notif && notif.style.opacity === '0') notif.remove(); }, 2500);
            localStorage.removeItem('showPostEditSuccess');
        }

        // At the top of the script, after the post edit success message block:
        if (localStorage.getItem('showProjectEditSuccess') === '1') {
            let notif = document.createElement('div');
            notif.id = 'customSuccessNotif';
            notif.style.position = 'fixed';
            notif.style.top = '32px';
            notif.style.left = '50%';
            notif.style.transform = 'translateX(-50%)';
            notif.style.background = '#2ecc40';
            notif.style.color = '#fff';
            notif.style.padding = '16px 32px';
            notif.style.borderRadius = '8px';
            notif.style.boxShadow = '0 4px 16px rgba(0,0,0,0.15)';
            notif.style.display = 'flex';
            notif.style.alignItems = 'center';
            notif.style.gap = '12px';
            notif.style.fontSize = '1.1rem';
            notif.style.zIndex = '3000';
            notif.style.opacity = '0';
            notif.style.transition = 'opacity 0.3s';
            notif.innerHTML = '<span style="font-size:1.5rem;">✔️</span> <span>Project updated successfully!</span>';
            document.body.appendChild(notif);
            setTimeout(() => { notif.style.opacity = '1'; }, 10);
            setTimeout(() => { if (notif) notif.style.opacity = '0'; }, 2000);
            setTimeout(() => { if (notif && notif.style.opacity === '0') notif.remove(); }, 2500);
            localStorage.removeItem('showProjectEditSuccess');
        }

        document.addEventListener('DOMContentLoaded', async () => {
            // Get auth token
            const token = localStorage.getItem('token');
            if (!token) {
                window.location.href = 'index.html';
                return;
            }

            // Add loading states
            addLoadingStates();

            try {
                // Fetch user profile data
                const response = await fetch(`${API_BASE_URL}/api/profile`, {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                if (!response.ok) {
                    throw new Error('Failed to fetch profile data');
                }

                const user = await response.json();

                // Update profile picture
                const profilePicture = document.getElementById('profilePicture');
                console.log('Profile data received:', { name: user.name, picture: user.picture });
                
                if (user.picture && user.picture !== 'null' && user.picture !== 'undefined') {
                    console.log('Setting profile picture:', user.picture);
                    
                    // Handle different types of picture URLs
                    let pictureUrl = user.picture;
                    
                    // If it's a relative path (default or uploaded), convert to full URL
                    if (pictureUrl.startsWith('/images/')) {
                        // Default profile picture
                        pictureUrl = `${API_BASE_URL}${pictureUrl}`;
                        console.log('Converted default picture URL:', pictureUrl);
                    } else if (pictureUrl.startsWith('uploads/')) {
                        // Uploaded profile picture - already handled by backend
                        console.log('Using uploaded picture URL:', pictureUrl);
                    } else if (pictureUrl.startsWith('http')) {
                        // External URL (Google picture)
                        console.log('Using external picture URL:', pictureUrl);
                    }
                    
                    profilePicture.src = pictureUrl;
                    
                    // Add error handling for image loading
                    profilePicture.onerror = function() {
                        console.log('Failed to load profile picture, using fallback');
                        const initials = user.name
                            .split(' ')
                            .map(word => word[0])
                            .join('')
                            .toUpperCase()
                            .slice(0, 2);
                        profilePicture.src = `https://ui-avatars.com/api/?name=${initials}&background=FF8A00&color=fff&size=200`;
                    };
                    
                    profilePicture.onload = function() {
                        console.log('Profile picture loaded successfully');
                    };
                } else {
                    console.log('No profile picture, using fallback');
                    // Use initials as fallback
                    const initials = user.name
                    .split(' ')
                    .map(word => word[0])
                    .join('')
                    .toUpperCase()
                    .slice(0, 2);
                    profilePicture.src = `https://ui-avatars.com/api/?name=${initials}&background=FF8A00&color=fff&size=200`;
                }

                // Update profile information
                document.getElementById('profileUsername').textContent = user.username || user.name.toLowerCase().replace(/\s+/g, '');
                document.getElementById('profileName').textContent = user.name;
                document.getElementById('profileBio').textContent = user.bio || 'No bio provided';
                
                // Update personal information
                document.getElementById('profileEmail').textContent = user.email || 'Not provided';
                document.getElementById('profilePhone').textContent = user.phone || 'Not provided';
                document.getElementById('profileLocation').textContent = user.location || 'Not provided';
                // Removed update for profileAltPhone since the element no longer exists
                // document.getElementById('profileAltPhone').textContent = user.altPhone || user.phone || 'Not provided';
                document.getElementById('profileBio').textContent = user.bio || 'No bio provided';

                // Update skills with animation
                const skillsContainer = document.getElementById('skillsContainer');
                if (user.skills && Array.isArray(user.skills) && user.skills.filter(s => s && s.trim()).length > 0) {
                    skillsContainer.innerHTML = ''; // Clear previous content
                    user.skills.filter(s => s && s.trim()).forEach((skill, index) => {
                        setTimeout(() => {
                            const skillTag = document.createElement('div');
                            skillTag.className = 'skill-tag';
                            skillTag.textContent = skill;
                            skillsContainer.appendChild(skillTag);
                        }, index * 100);
                    });
                } else {
                    skillsContainer.innerHTML = '<p style="color: rgba(255,255,255,0.6); font-style: italic;">No skills added yet</p>';
                }

                // Update social links
                const socialLinksContainer = document.getElementById('socialLinks');
                if (user.socialLinks || user.linkedin || user.website || user.instagram) {
                    const links = [];
                    if (user.socialLinks?.linkedin || user.linkedin) {
                        links.push(`<a href="${user.socialLinks?.linkedin || user.linkedin}" class="social-link linkedin" target="_blank">
                            <i class="fab fa-linkedin"></i>
                            <span>LinkedIn</span>
                        </a>`);
                    }
                    if (user.socialLinks?.website || user.website) {
                        links.push(`<a href="${user.socialLinks?.website || user.website}" class="social-link website" target="_blank">
                            <i class="fas fa-globe"></i>
                            <span>Website</span>
                        </a>`);
                    }
                    if (user.socialLinks?.instagram || user.instagram) {
                        links.push(`<a href="${user.socialLinks?.instagram || user.instagram}" class="social-link instagram" target="_blank">
                            <i class="fab fa-instagram"></i>
                            <span>Instagram</span>
                        </a>`);
                    }
                    if (links.length > 0) {
                        socialLinksContainer.innerHTML = links.join('');
                    } else {
                        socialLinksContainer.innerHTML = '<p style="color: rgba(255,255,255,0.6); font-style: italic;">No social links added</p>';
                    }
                    } else {
                    socialLinksContainer.innerHTML = '<p style="color: rgba(255,255,255,0.6); font-style: italic;">No social links added</p>';
                }
                    
                // Update projects with animation
                const projectsGrid = document.getElementById('projectsGrid');
                const emptyState = document.getElementById('emptyState');
                
                if (user.projects && Array.isArray(user.projects) && user.projects.length > 0) {
                    projectsGrid.style.display = 'grid';
                    emptyState.style.display = 'none';
                    
                    user.projects.forEach((project, index) => {
                        setTimeout(() => {
                            const projectCard = document.createElement('div');
                            projectCard.className = 'project-card';
                            // Add three dots menu
                            const menu = document.createElement('div');
                            menu.className = 'card-menu';
                            menu.innerHTML = `
                                <div class="three-dots" style="position:absolute;top:12px;right:12px;cursor:pointer;z-index:2;">
                                    <i class="fas fa-ellipsis-v"></i>
                                    <div class="menu-dropdown" style="display:none;position:absolute;right:0;top:28px;background:#232526;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,0.25);min-width:120px;overflow:hidden;">
                                        <div class="menu-item edit-project" data-index="${index}" style="padding:10px 18px;color:#fff;cursor:pointer;text-align:left;transition:background 0.2s;">Edit</div>
                                        <div style="height:1px;background:#333;margin:0;"></div>
                                        <div class="menu-item delete-project" data-index="${index}" style="padding:10px 18px;color:#ff4d4f;cursor:pointer;text-align:left;transition:background 0.2s;">Delete</div>
                                    </div>
                                </div>
                            `;
                            menu.querySelectorAll('.menu-item').forEach(item => {
                                item.addEventListener('mouseenter', function() {
                                    this.style.background = '#333';
                                });
                                item.addEventListener('mouseleave', function() {
                                    this.style.background = 'none';
                                });
                            });
                            
                            let mediaContent = '';
                            if (project.media && project.media.length > 0) {
                                const media = project.media[0];
                                if (media.type === 'video') {
                                    mediaContent = `<video class="project-media" muted><source src="${media.url}" type="video/mp4"></video>`;
                                } else {
                                    mediaContent = `<img src="${media.url}" alt="${project.name}" class="project-media">`;
                                }
                            } else {
                                // Default placeholder with gradient

// Replace all direct event listeners for modal like, comment, and share buttons with a single event delegation handler:

// Find the section after postModalOverlay.classList.add('active');
// Add this event delegation logic:

postModalOverlay.onclick = async function(e) {
  // Like button
  if (e.target.closest('#postModalLikeBtn')) {
    e.stopPropagation();
    const token = localStorage.getItem('token');
    try {
      const response = await fetch(`/api/posts/${post._id}/like`, {
        method: 'POST',
        headers: { 'Authorization': `Bearer ${token}` }
      });
      if (!response.ok) throw new Error('Failed to like post');
      const result = await response.json();
      const likeCount = document.getElementById('postModalLikes');
      const likeIcon = document.getElementById('postModalLikeBtn').querySelector('i');
      likeCount.textContent = result.likes.length;
      if (result.liked) {
        document.getElementById('postModalLikeBtn').classList.add('liked');
        likeIcon.classList.remove('far');
        likeIcon.classList.add('fas');
      } else {
        document.getElementById('postModalLikeBtn').classList.remove('liked');
        likeIcon.classList.remove('fas');
        likeIcon.classList.add('far');
      }
    } catch (error) {
      alert('Failed to like post. Please try again.');
    }
    return;
  }
  // Comment button
  if (e.target.closest('#postModalCommentBtn')) {
    e.stopPropagation();
    const igModalRightContainer = document.getElementById('igModalRightContainer');
    igModalRightContainer.innerHTML = `
      <div class="ig-modal-right">
        <button class="post-modal-close" id="postModalClose">&times;</button>
        <div class="comments-section" id="postModalCommentsSection"></div>
        <div class="add-comment" id="postModalAddComment" style="display:flex;">
          <input type="text" placeholder="Add a comment..." class="comment-input" id="postModalCommentInput">
          <button class="submit-comment" id="postModalSubmitComment">Post</button>
        </div>
      </div>
    `;
    // Attach close button event
    const postModalCloseBtn = document.getElementById('postModalClose');
    if (postModalCloseBtn) {
      postModalCloseBtn.onclick = function() {
        postModalOverlay.classList.remove('active');
      };
    }
    // Fetch and display comments
    const commentsSection = document.getElementById('postModalCommentsSection');
    try {
      const token = localStorage.getItem('token');
      const response = await fetch(`/api/posts/${post._id}/comments`, {
        headers: { 'Authorization': `Bearer ${token}` }
      });
      if (!response.ok) throw new Error('Failed to fetch comments');
      const result = await response.json();
      commentsSection.innerHTML = result.comments && result.comments.length
        ? result.comments.map(c => `<div style='margin-bottom:4px;'><b>${c.author?.name || 'User'}:</b> ${c.text}</div>`).join('')
        : '<div style=\"color:#ccc;\">No comments yet.</div>';
    } catch (error) {
      commentsSection.innerHTML = '<div style=\"color:#f88;\">Failed to load comments.</div>';
    }
    // Add comment submit logic
    const submitCommentBtn = document.getElementById('postModalSubmitComment');
    const commentInput = document.getElementById('postModalCommentInput');
    if (submitCommentBtn && commentInput) {
      submitCommentBtn.onclick = async function(ev) {
        ev.stopPropagation();
        const text = commentInput.value.trim();
        if (!text) return;
        try {
          const token = localStorage.getItem('token');
          const response = await fetch(`/api/posts/${post._id}/comment`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
            body: JSON.stringify({ text })
          });
          if (!response.ok) throw new Error('Failed to add comment');
          commentInput.value = '';
          // Refresh comments
          document.getElementById('postModalCommentBtn').click();
        } catch (error) {
          alert('Failed to add comment.');
        }
      };
    }
    return;
  }
  // Share button
  if (e.target.closest('#postModalShareBtn')) {
    e.stopPropagation();
    const postUrl = window.location.origin + `/post/${post._id}`;
    const modalShareBtn = document.getElementById('postModalShareBtn');
    navigator.clipboard.writeText(postUrl).then(() => {
      modalShareBtn.innerHTML = '<i class="far fa-paper-plane"></i> Copied!';
      setTimeout(() => {
        modalShareBtn.innerHTML = '<i class="far fa-paper-plane"></i>';
      }, 1200);
    }).catch(() => {
      alert('Failed to copy link.');
    });
    return;
  }
};
