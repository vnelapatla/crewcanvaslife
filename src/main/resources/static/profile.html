<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile | CrewCanvas</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="css/main.css">
    <style>
        :root {
            --primary-orange: #ff8c00;
            --bg-light: #ffffff;
            --card-bg: #f8fafc;
            --text-dark: #0f172a;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
        }

        body {
            background-color: var(--bg-light);
            color: var(--text-dark);
            font-family: 'Inter', sans-serif;
        }

        .profile-container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 40px 20px 100px;
        }

        .profile-hero {
            display: flex;
            align-items: center;
            gap: 40px;
            margin-bottom: 50px;
            padding: 40px;
            background: white;
            border-radius: 30px;
            border: 1px solid var(--border-color);
            box-shadow: 0 20px 60px rgba(0,0,0,0.04);
        }

        .profile-avatar-wrapper {
            position: relative;
            width: 180px;
            height: 180px;
        }

        .profile-avatar-wrapper img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid var(--primary-orange);
        }

        .profile-info h1 {
            font-size: 36px;
            font-weight: 900;
            margin: 0 0 10px 0;
            text-transform: uppercase;
        }

        .role-badge {
            display: inline-block;
            background: var(--primary-orange);
            color: white;
            padding: 6px 20px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 800;
            text-transform: uppercase;
            margin-bottom: 20px;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            margin-bottom: 50px;
        }

        .info-card {
            background: white;
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 30px;
        }

        .info-item {
            display: flex;
            justify-content: space-between;
            background: #f8fafc;
            padding: 15px 20px;
            border-radius: 16px;
            margin-bottom: 10px;
        }

        .tabs-container {
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 30px;
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .tab-btn {
            background: none;
            border: none;
            padding: 15px 20px;
            font-weight: 800;
            cursor: pointer;
            text-transform: uppercase;
            color: var(--text-muted);
        }

        .tab-btn.active {
            color: var(--primary-orange);
            border-bottom: 3px solid var(--primary-orange);
        }

        .role-pill {
            background: #f1f5f9;
            color: #334155;
            padding: 6px 15px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            margin-right: 5px;
            margin-bottom: 5px;
            display: inline-block;
        }

        @media (max-width: 768px) {
            .profile-hero { flex-direction: column; text-align: center; }
            .profile-avatar-wrapper { width: 140px; height: 140px; }
        }
    </style>
</head>
<body>

    <nav class="sidebar">
        <div class="brand">
            <h2>CrewCanvas</h2>
        </div>
        <div class="nav-menu">
            <a href="home.html" class="nav-item"><i class="fa-solid fa-house"></i><span>Feed</span></a>
            <a href="crew-search.html" class="nav-item"><i class="fa-solid fa-magnifying-glass"></i><span>Search</span></a>
            <a href="messages.html" class="nav-item"><i class="fa-solid fa-message"></i><span>Messages</span></a>
            <a href="profile.html" class="nav-item active"><i class="fa-solid fa-user"></i><span>Profile</span></a>
        </div>
    </nav>

    <main class="main-content">
        <header class="top-header"></header>

        <div class="profile-container">
            <div class="profile-hero">
                <div class="profile-avatar-wrapper">
                    <img id="profileImage" src="https://via.placeholder.com/180" alt="Profile">
                </div>
                <div class="profile-info">
                    <h1 id="profileName">Creative Professional</h1>
                    <div class="role-badge" id="profileRoleBadge">Film Professional</div>
                    <p id="profileBio" style="color: var(--text-muted); line-height: 1.6; margin-bottom: 20px;">No bio added yet.</p>
                    <div style="display: flex; gap: 15px; justify-content: center;">
                        <button id="actionButton" style="background: var(--primary-orange); color: white; border: none; padding: 12px 30px; border-radius: 30px; font-weight: 800; cursor: pointer;">Edit Profile</button>
                    </div>
                </div>
            </div>

            <div class="info-grid">
                <div class="info-card">
                    <h3>About</h3>
                    <div class="info-item"><span class="label">Location</span><span class="value" id="profileLocation">Unknown</span></div>
                    <div class="info-item"><span class="label">Experience</span><span class="value" id="profileExperience">Professional</span></div>
                    <div class="info-item"><span class="label">Email</span><span class="value" id="profileEmail">Not shared</span></div>
                </div>
                <div class="info-card">
                    <h3>Skills</h3>
                    <div id="skillsContainer"></div>
                </div>
            </div>

            <div class="tabs-container">
                <button class="tab-btn active" onclick="switchTab('posts', this)">Posts</button>
                <button class="tab-btn" onclick="switchTab('projects', this)">Portfolio</button>
            </div>

            <div id="postsContent"></div>
            <div id="projectsContent" style="display: none;"></div>
        </div>
    </main>

    <script src="js/utils.js"></script>
    <script src="js/profile.js"></script>
</body>
</html>
