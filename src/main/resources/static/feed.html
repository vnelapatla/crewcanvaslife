<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no, viewport-fit=cover">
    <title>Feed | CrewCanvas</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/feed.css?v=2.7">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Force LinkedIn Styles */
        .comment-item.linkedin-style { display: flex !important; gap: 12px !important; margin-bottom: 12px !important; padding: 4px 0 !important; font-family: 'Inter', sans-serif !important; }
        .comment-avatar-wrapper { flex-shrink: 0 !important; }
        .comment-content-wrapper { flex-grow: 1 !important; display: flex !important; flex-direction: column !important; }
        .comment-bubble { background-color: #f3f2ef !important; padding: 12px 16px !important; border-radius: 0 12px 12px 12px !important; display: inline-block !important; max-width: 100% !important; }
        .comment-author-info { display: flex !important; align-items: center !important; gap: 6px !important; margin-bottom: 2px !important; }
        .comment-author-name { font-weight: 700 !important; color: #262626 !important; text-decoration: none !important; font-size: 14px !important; }
        .comment-author-headline { color: #666 !important; font-size: 12px !important; margin: 0 !important; line-height: 1.4 !important; }
        .comment-body { font-size: 14px !important; color: #262626 !important; line-height: 1.5 !important; margin-top: 8px !important; }
        .comment-actions-bar { display: flex !important; align-items: center !important; gap: 16px !important; padding: 4px 8px !important; }
        .comment-action-btn { background: transparent !important; border: none !important; color: #666 !important; font-size: 13px !important; font-weight: 600 !important; cursor: pointer !important; padding: 4px 8px !important; }
        .post-action-btn.liked { color: #df1b1b !important; }
        .post-action-btn.liked i { color: #df1b1b !important; }
        .comment-input-container { display: flex !important; align-items: center !important; border: 1px solid #dcdcdc !important; border-radius: 24px !important; padding: 0 16px !important; background: #fff !important; flex-grow: 1 !important; }
        .post-action-btn.reposted { color: #0a66c2 !important; }
        .post-footer { display: flex !important; justify-content: space-between !important; padding: 0 4px !important; border-top: 1px solid #f1f5f9 !important; flex-wrap: nowrap !important; }
        .post-footer .post-action-btn { flex: 1 !important; display: flex !important; align-items: center !important; justify-content: center !important; gap: 4px !important; height: 44px !important; border-radius: 4px !important; transition: background 0.2s !important; color: #666 !important; font-weight: 600 !important; font-size: 13px !important; white-space: nowrap !important; }
        @media (max-width: 480px) {
            .post-footer .post-action-btn { font-size: 11px !important; gap: 4px !important; padding: 0 2px !important; }
            .post-footer .post-action-btn i { font-size: 14px !important; }
        }
        .post-footer .post-action-btn:hover { background: #f3f2ef !important; }
        .original-post-preview { border: 1px solid #e1e9ee !important; border-radius: 8px !important; padding: 16px !important; margin-top: 12px !important; background: #fff !important; transition: background 0.2s !important; }
        .original-post-preview:hover { background: #f8fafc !important; }
    </style>
</head>

<body class="with-sidebar">
    <!-- Sidebar is dynamically injected by utils.js -->

    <!-- Main Content -->
    <main class="main-content">
        <header class="top-header">
            <div class="header-left">
                <div class="sidebar-toggle" onclick="toggleSidebar()">
                    <i class="fa-solid fa-bars"></i>
                </div>
                <a href="feed.html" class="brand-logo">CrewCanvas</a>
            </div>
            <div class="status-bar">
                <i class="fa-solid fa-bell notification-bell-icon" onclick="toggleNotificationDropdown()"></i>
                <div class="user-profile-box" onclick="window.location.href='profile.html'">
                    <!-- Profile avatar will be injected by JS -->
                    <div class="user-avatar-placeholder"></div>
                </div>
            </div>
        </header>

        <div class="content-body">
            <div class="section-header">
                <h2 class="section-title">Community Feed</h2>
            </div>

            <!-- Smart Search Bar -->
            <div class="feed-search-wrapper" id="feedSearchWrapper">
                <div class="feed-search-bar">
                    <i class="fa-solid fa-magnifying-glass search-icon"></i>
                    <input 
                        type="text" 
                        id="feedSearchInput" 
                        data-i18n="search_placeholder"
                        placeholder="Search posts, accounts, topics, roles..." 
                        autocomplete="off"
                    >
                    <button id="feedSearchClearBtn" class="search-clear-btn" style="display:none;" onclick="clearFeedSearch()">
                        <i class="fa-solid fa-xmark"></i>
                    </button>
                    <button class="filter-toggle-btn" onclick="toggleFilterModal()" title="Search filters">
                        <i class="fa-solid fa-sliders"></i>
                    </button>
                </div>
                <!-- Profile-based smart filter chip (shown after profile update) -->
                <div id="smartFilterChip" class="smart-filter-chip" style="display:none;">
                    <i class="fa-solid fa-sparkles"></i>
                    <span id="smartFilterLabel">Posts for you</span>
                    <button class="chip-close" onclick="clearSmartFilter()" title="Clear filter"><i class="fa-solid fa-xmark"></i></button>
                </div>
                <div id="searchResultsInfo" class="search-results-info" style="display:none;"></div>
            </div>

            <!-- Create Post Section -->
            <div class="create-post-card card" style="margin-bottom: 30px;">
                <div id="standardPostInputs">
                    <textarea id="postContent" data-i18n="post_placeholder" placeholder="Share your latest project or news..." maxlength="150000"
                        style="background:#fcfcfc; border:1px solid #eee; border-radius:12px; height:100px; resize:none; padding:15px; margin-bottom: 10px; width:100%;"></textarea>
                    
                    <input type="url" id="postLink" placeholder="📎 Add external link (e.g. YouTube, Movie Projects)" 
                        style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #eee; margin-bottom: 15px; font-size: 13px;">
                </div>

                <div id="pollPostInputs" style="display: none;">
                    <input type="text" id="pollQuestion" placeholder="Ask a question..." 
                        style="width: 100%; padding: 15px; border-radius: 12px; border: 1px solid #eee; margin-bottom: 10px; background: #fcfcfc; font-weight: 600; width:100%;">
                    <div id="pollOptionsContainer">
                        <input type="text" class="poll-option-input" placeholder="Option 1" style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #eee; margin-bottom: 8px; font-size: 13px;">
                        <input type="text" class="poll-option-input" placeholder="Option 2" style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #eee; margin-bottom: 8px; font-size: 13px;">
                    </div>
                    <button onclick="addPollOption()" style="background: transparent; border: 1px dashed #ddd; color: #888; width: 100%; padding: 8px; border-radius: 8px; margin-bottom: 15px; cursor: pointer; font-size: 12px;">+ Add Option</button>
                </div>

                <div class="create-post-actions" style="display:flex; justify-content:space-between; align-items:center;">
                    <div style="display: flex; gap: 15px; align-items: center;">
                        <input type="file" id="postImage" accept="image/*,video/*" multiple style="display: none;">
                        <button id="mediaBtn" class="filter-toggle" onclick="document.getElementById('postImage').click()"
                            style="background:transparent; border:none; color: var(--text-muted); cursor: pointer;">
                            <span class="filter-icon">🖼️</span> Media
                        </button>
                        <button id="pollToggleBtn" onclick="togglePollMode()"
                            style="background:transparent; border:none; color: var(--text-muted); cursor: pointer;">
                            <span class="filter-icon">📊</span> Poll
                        </button>
                    </div>
                    <button id="submitPostBtn" class="auth-btn" style="width:120px; padding:10px;" onclick="createPost()" data-i18n="btn_post">Post</button>
                </div>
                <!-- Image Preview Container -->
                <div id="imagePreviewContainer" style="display: flex; gap: 10px; flex-wrap: wrap; margin-top: 15px;">
                    <!-- Previews will appear here -->
                </div>
            </div>

            <!-- Feed -->
            <div id="feedContainer" class="feed-container">
                <!-- Posts dynamic -->
            </div>

            <!-- Loading Indicator -->
            <div class="scroll-load">
                <div class="loader-dots">
                    <div class="dot dot-1"></div>
                    <div class="dot dot-2"></div>
                    <div class="dot dot-3"></div>
                </div>
            </div>
            <button id="loadMoreBtn" class="auth-btn" style="display:none; margin: 20px auto; width: 180px; background: #f0f0f0; color: #666; border: 1px solid #ddd; font-size: 14px;">Load More</button>
        </div>
    </main>

    <!-- Universal Bottom Navigation is injected by utils.js -->

    <!-- Edit Post Modal -->
    <div id="editPostModal" class="modal" style="display:none;">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Edit Post</h3>
                <button onclick="closeEditModal()" class="close-btn">&times;</button>
            </div>
            <div class="modal-body">
                <textarea id="editPostContent" maxlength="150000" placeholder="What's on your mind?"></textarea>
                <div id="editImagePreviewContainer" class="image-preview-grid"></div>
                <div class="modal-actions">
                    <div style="display: flex; gap: 10px;">
                        <input type="file" id="editPostImage" accept="image/*,video/*" multiple style="display: none;">
                        <button onclick="document.getElementById('editPostImage').click()" class="secondary-btn">
                            <i class="fa-regular fa-image"></i> Add Media
                        </button>
                    </div>
                    <button onclick="saveEditPost()" id="saveEditBtn" class="auth-btn" style="width: auto; padding: 10px 25px;">Save Changes</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Advanced Filter Modal -->
    <div id="filterModal" class="filter-modal-overlay" style="display:none;" onclick="handleModalOutsideClick(event)">
        <div class="filter-modal-content" onclick="event.stopPropagation()">
            <div class="filter-modal-header">
                <div class="drag-handle"></div>
                <div class="header-top">
                    <h3 class="modal-title">Posts filters</h3>
                    <button class="reset-link" onclick="resetFilters()">Reset</button>
                </div>
            </div>
            
            <div class="filter-modal-body">
                <!-- Sort By -->
                <div class="filter-section">
                    <h4 class="filter-section-title">Sort by</h4>
                    <div class="filter-options">
                        <label class="filter-radio-option">
                            <span>Top Match</span>
                            <input type="radio" name="sortBy" value="top">
                            <span class="radio-custom"></span>
                        </label>
                        <label class="filter-radio-option">
                            <span>Latest</span>
                            <input type="radio" name="sortBy" value="latest" checked>
                            <span class="radio-custom"></span>
                        </label>
                    </div>
                </div>

                <!-- Date Posted -->
                <div class="filter-section">
                    <h4 class="filter-section-title">Date posted</h4>
                    <div class="filter-options">
                        <label class="filter-radio-option">
                            <span>Past 24 hours</span>
                            <input type="radio" name="datePosted" value="day">
                            <span class="radio-custom"></span>
                        </label>
                        <label class="filter-radio-option">
                            <span>Past week</span>
                            <input type="radio" name="datePosted" value="week">
                            <span class="radio-custom"></span>
                        </label>
                        <label class="filter-radio-option">
                            <span>Past month</span>
                            <input type="radio" name="datePosted" value="month">
                            <span class="radio-custom"></span>
                        </label>
                        <label class="filter-radio-option">
                            <span>Any time</span>
                            <input type="radio" name="datePosted" value="all" checked>
                            <span class="radio-custom"></span>
                        </label>
                    </div>
                </div>

                <!-- Content Type -->
                <div class="filter-section">
                    <h4 class="filter-section-title">Content type</h4>
                    <div class="filter-options">
                        <label class="filter-radio-option">
                            <span>Videos</span>
                            <input type="radio" name="contentType" value="videos">
                            <span class="radio-custom"></span>
                        </label>
                        <label class="filter-radio-option">
                            <span>Images</span>
                            <input type="radio" name="contentType" value="images">
                            <span class="radio-custom"></span>
                        </label>
                        <label class="filter-radio-option">
                            <span>Polls</span>
                            <input type="radio" name="contentType" value="polls">
                            <span class="radio-custom"></span>
                        </label>
                        <label class="filter-radio-option">
                            <span>All</span>
                            <input type="radio" name="contentType" value="all" checked>
                            <span class="radio-custom"></span>
                        </label>
                    </div>
                </div>
            </div>

            <div class="filter-modal-footer">
                <button class="show-results-btn" onclick="applyFilters()">Show results</button>
            </div>
        </div>
    </div>

    <script src="js/utils.js?v=2.7"></script>
    <script src="js/profile-handler.js?v=2.7"></script>
    <script src="js/feed.js?v=2.7"></script>
</body>

</html>
