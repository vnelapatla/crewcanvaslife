<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Registration Form Builder</title>
    <link rel="stylesheet" href="styles/form-builder.css">
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f7f7f7; margin: 0; }
        .builder-container { max-width: 900px; margin: 40px auto; background: #fff; border-radius: 12px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); padding: 32px; }
        .builder-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
        .builder-title { font-size: 2rem; font-weight: 700; color: #333; }
        .preview-toggle { font-size: 1rem; cursor: pointer; background: #4a90e2; color: #fff; border: none; border-radius: 6px; padding: 8px 18px; transition: background 0.2s; }
        .preview-toggle:hover { background: #3577c9; }
        .fields-section { margin-bottom: 32px; }
        .fields-section h3 { margin-bottom: 12px; color: #4a90e2; }
        .default-fields, .custom-fields { margin-bottom: 18px; }
        .field-row { display: flex; align-items: center; gap: 16px; margin-bottom: 10px; }
        .field-label { font-weight: 500; color: #222; min-width: 120px; }
        .field-type { color: #888; font-size: 0.95rem; }
        .field-actions { margin-left: auto; }
        .add-field-btn { background: #FF8A00; color: #fff; border: none; border-radius: 6px; padding: 7px 16px; font-size: 1rem; cursor: pointer; }
        .add-field-btn:hover { background: #e67600; }
        .remove-btn { background: none; border: none; color: #e74c3c; font-size: 1.2rem; cursor: pointer; }
        .remove-btn:hover { color: #c0392b; }
        .conditional-logic-section { margin-bottom: 32px; }
        .logic-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
        .logic-label { color: #555; }
        .save-btn { background: #4a90e2; color: #fff; border: none; border-radius: 6px; padding: 10px 28px; font-size: 1.1rem; font-weight: 600; cursor: pointer; float: right; }
        .save-btn:hover { background: #3577c9; }
        .preview-section { background: #f2f6fa; border-radius: 8px; padding: 24px; margin-top: 24px; }
        .preview-section h3 { color: #222; }
        .preview-field { margin-bottom: 18px; }
        .preview-label { font-weight: 500; color: #333; display: block; margin-bottom: 6px; }
        .preview-input, .preview-select { width: 100%; padding: 8px; border-radius: 4px; border: 1px solid #ccc; }
    </style>
</head>
<body>
    <div class="builder-container">
        <div class="builder-header">
            <span class="builder-title">Registration Form Builder</span>
            <button class="preview-toggle" id="togglePreview">Preview Mode</button>
        </div>
        <form id="formBuilderForm">
            <div class="fields-section">
                <h3>Default Fields (Always Included)</h3>
                <div class="default-fields">
                    <div class="field-row"><span class="field-label">Name</span><span class="field-type">Text</span></div>
                    <div class="field-row"><span class="field-label">Email</span><span class="field-type">Email</span></div>
                    <div class="field-row"><span class="field-label">Age</span><span class="field-type">Number</span></div>
                    <div class="field-row"><span class="field-label">Gender</span><span class="field-type">Dropdown (Male/Female/Other)</span></div>
                    <div class="field-row"><span class="field-label">Phone Number</span><span class="field-type">Phone</span></div>
                    <div class="field-row"><span class="field-label">City</span><span class="field-type">Text</span></div>
                    <div class="field-row"><span class="field-label">State</span><span class="field-type">Text</span></div>
                </div>
            </div>
            <div class="fields-section">
                <h3>Custom Fields</h3>
                <div class="custom-fields" id="customFieldsContainer"></div>
                <button type="button" class="add-field-btn" id="addCustomFieldBtn">+ Add Field</button>
            </div>
            <div class="conditional-logic-section">
                <h3>Conditional Logic</h3>
                <div id="logicContainer"></div>
                <button type="button" class="add-field-btn" id="addLogicBtn">+ Add Logic</button>
            </div>
            <button type="submit" class="save-btn">Save Form</button>
        </form>
        <div class="preview-section" id="previewSection" style="display:none;">
            <h3>Form Preview</h3>
            <form id="previewForm"></form>
        </div>
    </div>
    <script src="js/form-builder.js"></script>
</body>
</html>
