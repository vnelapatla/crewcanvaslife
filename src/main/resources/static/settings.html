<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CrewCanvas - Settings</title>
    <link rel="stylesheet" href="styles/home.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="js/profile-handler.js"></script>
</head>
<body>
    <div class="dashboard-container">
        <aside class="sidebar">
            <div class="logo">
                <h1>CrewCanvas</h1>
                <p class="logo-caption">Where all crafts connect</p>
            </div>
            <nav class="nav-menu">
                <a href="home.html" class="nav-item">
                    <i class="fas fa-home"></i>
                    <span>Dashboard</span>
                </a>
                <a href="crew-search.html" class="nav-item active">
                    <i class="fas fa-search"></i>
                    <span>Crew Search</span>
                </a>
                <a href="messages.html" class="nav-item">
                    <i class="fas fa-envelope"></i>
                    <span>Messages</span>
                </a>
                <a href="settings.html" class="nav-item active">
                    <i class="fas fa-cog"></i>
                    <span>Settings</span>
                </a>
                <a href="#" class="nav-item" id="logoutBtn">
                    <i class="fas fa-sign-out-alt"></i>
                    <span>Log Out</span>
                </a>
            </nav>
        </aside>
        <main class="main-content">
            <nav class="top-nav">
                 <div class="search-bar">
                     <i class="fas fa-search"></i>
                     <input type="text" placeholder="Search settings...">
                 </div>
                 <div class="nav-right">
                    <div class="notifications">
                        <i class="fas fa-bell"></i>
                    </div>  
                    <div class="user-profile">
                        <img src="https://ui-avatars.com/api/?name=User&background=random" alt="Profile">
                        <span class="user-name"></span>
                        <div class="profile-dropdown">
                            <a href="profile.html" class="dropdown-item"><i class="fas fa-user"></i> My Profile</a>
                            <a href="edit-profile.html" class="dropdown-item"><i class="fas fa-edit"></i> Edit Profile</a>
                            <a href="settings.html" class="dropdown-item"><i class="fas fa-cog"></i> Settings</a>
                            <a href="#" class="dropdown-item" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</a>
                        </div>
                    </div>
                </div>
            </nav>
            <div class="dashboard-content">
                <h2>Settings</h2>
                <p>Manage your account and application settings here. (Feature coming soon!)</p>
            </div>
        </main>
    </div>
    <script src="js/home.js"></script>
</body>
</html>
