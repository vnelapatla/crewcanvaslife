<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set New Password | CrewCanvas</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/modern-core.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body {
            background-color: var(--bg-main);
            margin: 0;
            padding: 0;
            min-height: 100vh;
        }
        .main-content {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: linear-gradient(rgba(10, 12, 16, 0.9), rgba(10, 12, 16, 0.9)), 
                        url('images/auth_premium.png');
            background-size: cover;
            background-position: center;
        }
        .auth-container {
            width: 100%;
            max-width: 440px;
            padding: 40px;
            z-index: 10;
        }
        .logo-section {
            text-align: center;
            margin-bottom: 32px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        #messageArea {
            margin-bottom: 20px;
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            display: none;
            word-break: break-word;
            overflow-wrap: anywhere;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .success { background: rgba(16, 185, 129, 0.1); color: #10b981; border: 1px solid rgba(16, 185, 129, 0.2); }
        .error { background: rgba(239, 68, 68, 0.1); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.2); }
    </style>
</head>
<body>
    <main class="main-content">
        <div class="auth-container glass-card animate-fade-up">
            <div class="logo-section">
                <h1 class="gradient-text">New Password</h1>
                <p style="color: var(--text-dim); font-size: 14px;">Secure your account with a new password</p>
            </div>

            <div id="messageArea"></div>

            <form id="resetPasswordForm">
                <div class="form-group">
                    <label style="display: block; margin-bottom: 8px; color: var(--text-dim); font-size: 13px;">New Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="newPassword" class="premium-input" placeholder="Min. 8 characters" required minlength="8">
                        <i class="fas fa-eye password-toggle" onclick="togglePassword('newPassword', this)"></i>
                    </div>
                </div>
                <div class="form-group">
                    <label style="display: block; margin-bottom: 8px; color: var(--text-dim); font-size: 13px;">Confirm New Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="confirmPassword" class="premium-input" placeholder="••••••••" required>
                        <i class="fas fa-eye password-toggle" onclick="togglePassword('confirmPassword', this)"></i>
                    </div>
                </div>
                <button type="submit" id="submitBtn" class="premium-btn" style="width: 100%;">
                    Update Password
                </button>
            </form>

            <div id="successActions" style="display: none; text-align: center; margin-top: 24px;">
                <a href="index.html" class="premium-btn" style="text-decoration: none; display: inline-block;">Login Now</a>
            </div>
        </div>
    </main>

    <script src="js/utils.js?v=1.2"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');

        if (!token) {
            const messageArea = document.getElementById('messageArea');
            messageArea.innerText = 'Invalid reset link. Please request a new one.';
            messageArea.className = 'error';
            messageArea.style.display = '-webkit-box';
            document.getElementById('resetPasswordForm').style.display = 'none';
        }

        document.getElementById('resetPasswordForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const messageArea = document.getElementById('messageArea');
            const submitBtn = document.getElementById('submitBtn');

            if (newPassword !== confirmPassword) {
                messageArea.innerText = 'Passwords do not match.';
                messageArea.className = 'error';
                messageArea.style.display = '-webkit-box';
                return;
            }

            submitBtn.disabled = true;
            submitBtn.innerText = 'Updating...';

            try {
                const response = await fetch('/api/auth/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, newPassword })
                });

                if (response.ok) {
                    const data = await response.json();
                    messageArea.innerText = (data && data.message) ? data.message : 'Password has been reset successfully.';
                    messageArea.className = 'success';
                    messageArea.style.display = '-webkit-box';
                    document.getElementById('resetPasswordForm').style.display = 'none';
                    document.getElementById('successActions').style.display = 'block';
                } else {
                    const errorText = await response.text();
                    messageArea.innerText = errorText || 'Failed to reset password. The link may be invalid or expired.';
                    messageArea.className = 'error';
                    messageArea.style.display = '-webkit-box';
                    submitBtn.disabled = false;
                    submitBtn.innerText = 'Update Password';
                }
            } catch (error) {
                console.error('Reset password error:', error);
                messageArea.innerText = 'Something went wrong. Please check your connection.';
                messageArea.className = 'error';
                messageArea.style.display = '-webkit-box';
                submitBtn.disabled = false;
                submitBtn.innerText = 'Update Password';
            }
        });
    </script>
</body>
</html>
