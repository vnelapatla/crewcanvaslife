<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Management Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .dashboard {
            padding: 30px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: #f8f9fa;
            padding: 25px;
            border-radius: 10px;
            text-align: center;
            border-left: 4px solid #667eea;
        }

        .stat-number {
            font-size: 2.5em;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 10px;
        }

        .stat-label {
            color: #666;
            font-size: 1.1em;
        }

        .filters-section {
            background: #f8f9fa;
            padding: 25px;
            border-radius: 10px;
            margin-bottom: 30px;
        }

        .filters-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            align-items: end;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
        }

        .filter-group label {
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }

        .filter-group input,
        .filter-group select {
            padding: 12px;
            border: 2px solid #e1e5e9;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        .filter-group input:focus,
        .filter-group select:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-block;
            text-align: center;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5a6fd8;
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: #6c757d;
            color: white;
        }

        .btn-secondary:hover {
            background: #5a6268;
        }

        .btn-success {
            background: #28a745;
            color: white;
        }

        .btn-success:hover {
            background: #218838;
        }

        .registrations-table {
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .table-header {
            background: #f8f9fa;
            padding: 20px;
            border-bottom: 2px solid #e9ecef;
            display: flex;
            justify-content: between;
            align-items: center;
        }

        .table-title {
            font-size: 1.5em;
            font-weight: bold;
            color: #333;
        }

        .table-actions {
            display: flex;
            gap: 10px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid #e9ecef;
        }

        th {
            background: #f8f9fa;
            font-weight: 600;
            color: #333;
        }

        tr:hover {
            background: #f8f9fa;
        }

        .file-badge {
            background: #e3f2fd;
            color: #1976d2;
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
        }

        .file-link {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }

        .file-link:hover {
            text-decoration: underline;
        }

        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            padding: 20px;
            background: #f8f9fa;
        }

        .pagination button {
            padding: 8px 15px;
            border: 1px solid #dee2e6;
            background: white;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .pagination button:hover {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .pagination button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .loading {
            text-align: center;
            padding: 50px;
            color: #666;
        }

        .error {
            background: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .success {
            background: #d4edda;
            color: #155724;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
        }

        .modal-content {
            background-color: white;
            margin: 5% auto;
            padding: 30px;
            border-radius: 15px;
            width: 80%;
            max-width: 600px;
            max-height: 80vh;
            overflow-y: auto;
        }

        .close {
            color: #aaa;
            float: right;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
        }

        .close:hover {
            color: #000;
        }

        .file-preview {
            max-width: 100%;
            max-height: 300px;
            border-radius: 8px;
            margin: 10px 0;
        }

        @media (max-width: 768px) {
            .filters-grid {
                grid-template-columns: 1fr;
            }
            
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .table-header {
                flex-direction: column;
                gap: 15px;
            }
            
            table {
                font-size: 14px;
            }
            
            th, td {
                padding: 10px 8px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎭 Event Management Dashboard</h1>
            <p>Manage registrations and view participant data for your events</p>
        </div>

        <div class="dashboard">
            <!-- Event Selection -->
            <div class="filters-section">
                <h3 style="margin-bottom: 20px; color: #333;">Select Your Event</h3>
                <div class="filters-grid">
                    <div class="filter-group">
                        <label for="eventSelect">Choose Event:</label>
                        <select id="eventSelect" onchange="loadEventData()">
                            <option value="">Select an event...</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <button class="btn btn-primary" onclick="loadMyEvents()">Load My Events</button>
                    </div>
                </div>
            </div>

            <!-- Statistics -->
            <div class="stats-grid" id="statsGrid" style="display: none;">
                <div class="stat-card">
                    <div class="stat-number" id="totalRegistrations">0</div>
                    <div class="stat-label">Total Registrations</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="maleCount">0</div>
                    <div class="stat-label">Male Participants</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="femaleCount">0</div>
                    <div class="stat-label">Female Participants</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="filesCount">0</div>
                    <div class="stat-label">With Uploaded Files</div>
                </div>
            </div>

            <!-- Filters -->
            <div class="filters-section" id="filtersSection" style="display: none;">
                <h3 style="margin-bottom: 20px; color: #333;">Filter & Search Registrations</h3>
                <div class="filters-grid">
                    <div class="filter-group">
                        <label for="searchInput">Search:</label>
                        <input type="text" id="searchInput" placeholder="Search by name or email...">
                    </div>
                    <div class="filter-group">
                        <label for="genderFilter">Gender:</label>
                        <select id="genderFilter">
                            <option value="">All Genders</option>
                            <option value="male">Male</option>
                            <option value="female">Female</option>
                            <option value="other">Other</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label for="ageFilter">Age Group:</label>
                        <select id="ageFilter">
                            <option value="">All Ages</option>
                            <option value="under18">Under 18</option>
                            <option value="18-25">18-25</option>
                            <option value="26-35">26-35</option>
                            <option value="36-50">36-50</option>
                            <option value="over50">Over 50</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label for="filesFilter">Files:</label>
                        <select id="filesFilter">
                            <option value="">All Registrations</option>
                            <option value="true">With Files</option>
                            <option value="false">Without Files</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label for="sortBy">Sort By:</label>
                        <select id="sortBy">
                            <option value="registration_date">Registration Date</option>
                            <option value="name">Name</option>
                            <option value="email">Email</option>
                            <option value="age">Age</option>
                            <option value="gender">Gender</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label for="sortOrder">Order:</label>
                        <select id="sortOrder">
                            <option value="DESC">Newest First</option>
                            <option value="ASC">Oldest First</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <button class="btn btn-primary" onclick="applyFilters()">Apply Filters</button>
                    </div>
                    <div class="filter-group">
                        <button class="btn btn-secondary" onclick="clearFilters()">Clear Filters</button>
                    </div>
                </div>
            </div>

            <!-- Messages -->
            <div id="messageContainer"></div>

            <!-- Registrations Table -->
            <div class="registrations-table" id="registrationsTable" style="display: none;">
                <div class="table-header">
                    <div class="table-title">Registrations</div>
                    <div class="table-actions">
                        <button class="btn btn-success" onclick="exportToCSV()">📊 Export CSV</button>
                        <button class="btn btn-primary" onclick="downloadAllFiles()">📁 Download All Files</button>
                    </div>
                </div>
                <div id="tableContainer">
                    <div class="loading">Loading registrations...</div>
                </div>
                <div class="pagination" id="pagination" style="display: none;">
                    <button id="prevBtn" onclick="changePage(-1)">Previous</button>
                    <span id="pageInfo">Page 1 of 1</span>
                    <button id="nextBtn" onclick="changePage(1)">Next</button>
                </div>
            </div>
        </div>
    </div>

    <!-- File Preview Modal -->
    <div id="fileModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <h2 id="modalTitle">File Preview</h2>
            <div id="modalContent"></div>
        </div>
    </div>

    <script>
        let currentEventId = null;
        let currentPage = 1;
        let totalPages = 1;
        let currentFilters = {};

        // Check authentication on page load
        document.addEventListener('DOMContentLoaded', function() {
            checkAuth();
            loadMyEvents();
        });

        function checkAuth() {
            const token = localStorage.getItem('token');
            if (!token) {
                showMessage('Please log in to access the event management dashboard', 'error');
                setTimeout(() => {
                    window.location.href = '/auth.html';
                }, 2000);
            }
        }

        async function loadMyEvents() {
            try {
                const token = localStorage.getItem('token');
                const response = await fetch('/api/events/my-events', {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                if (response.ok) {
                    const events = await response.json();
                    const eventSelect = document.getElementById('eventSelect');
                    eventSelect.innerHTML = '<option value="">Select an event...</option>';
                    
                    events.forEach(event => {
                        const option = document.createElement('option');
                        option.value = event.id;
                        option.textContent = `${event.title} (${event.type})`;
                        eventSelect.appendChild(option);
                    });

                    if (events.length === 0) {
                        showMessage('No events found. Create an event first!', 'error');
                    }
                } else {
                    showMessage('Failed to load events', 'error');
                }
            } catch (error) {
                console.error('Error loading events:', error);
                showMessage('Error loading events', 'error');
            }
        }

        async function loadEventData() {
            const eventId = document.getElementById('eventSelect').value;
            if (!eventId) {
                hideEventData();
                return;
            }

            currentEventId = eventId;
            currentPage = 1;
            showEventData();
            await loadRegistrations();
        }

        function showEventData() {
            document.getElementById('statsGrid').style.display = 'grid';
            document.getElementById('filtersSection').style.display = 'block';
            document.getElementById('registrationsTable').style.display = 'block';
        }

        function hideEventData() {
            document.getElementById('statsGrid').style.display = 'none';
            document.getElementById('filtersSection').style.display = 'none';
            document.getElementById('registrationsTable').style.display = 'none';
        }

        async function loadRegistrations() {
            if (!currentEventId) return;

            try {
                showLoading();
                
                const params = new URLSearchParams({
                    page: currentPage,
                    limit: 20,
                    ...currentFilters
                });

                const token = localStorage.getItem('token');
                const response = await fetch(`/api/events/${currentEventId}/manage-registrations?${params}`, {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                if (response.ok) {
                    const data = await response.json();
                    displayStatistics(data.statistics);
                    displayRegistrations(data.registrations);
                    displayPagination(data.pagination);
                } else {
                    showMessage('Failed to load registrations', 'error');
                }
            } catch (error) {
                console.error('Error loading registrations:', error);
                showMessage('Error loading registrations', 'error');
            }
        }

        function displayStatistics(stats) {
            // Total registrations
            const total = stats.genderDistribution.reduce((sum, g) => sum + g.count, 0);
            document.getElementById('totalRegistrations').textContent = total;

            // Gender counts
            const maleCount = stats.genderDistribution.find(g => g.gender === 'male')?.count || 0;
            const femaleCount = stats.genderDistribution.find(g => g.gender === 'female')?.count || 0;
            document.getElementById('maleCount').textContent = maleCount;
            document.getElementById('femaleCount').textContent = femaleCount;

            // Files count
            const filesCount = stats.fileUploadStats.find(f => f.file_status === 'With Files')?.count || 0;
            document.getElementById('filesCount').textContent = filesCount;
        }

        function displayRegistrations(registrations) {
            const container = document.getElementById('tableContainer');
            
            if (registrations.length === 0) {
                container.innerHTML = '<div class="loading">No registrations found</div>';
                return;
            }

            let html = `
                <table>
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Age</th>
                            <th>Gender</th>
                            <th>Phone</th>
                            <th>Location</th>
                            <th>Registration Date</th>
                            <th>Files</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
            `;

            registrations.forEach(reg => {
                html += `
                    <tr>
                        <td><strong>${reg.name || 'N/A'}</strong></td>
                        <td>${reg.email || 'N/A'}</td>
                        <td>${reg.age || 'N/A'}</td>
                        <td>${reg.gender || 'N/A'}</td>
                        <td>${reg.phone || 'N/A'}</td>
                        <td>${reg.city || 'N/A'}, ${reg.state || 'N/A'}</td>
                        <td>${new Date(reg.registration_date).toLocaleDateString()}</td>
                        <td>
                            ${reg.uploadedFiles.length > 0 ? 
                                `<span class="file-badge">${reg.uploadedFiles.length} files</span>` : 
                                'No files'
                            }
                        </td>
                        <td>
                            ${reg.uploadedFiles.map(file => 
                                `<a href="#" onclick="previewFile('${file.filename}', '${file.originalName}', '${file.mimetype}', '${file.previewUrl}')" class="file-link">View ${file.originalName}</a><br>`
                            ).join('')}
                        </td>
                    </tr>
                `;
            });

            html += '</tbody></table>';
            container.innerHTML = html;
        }

        function displayPagination(pagination) {
            const paginationDiv = document.getElementById('pagination');
            const pageInfo = document.getElementById('pageInfo');
            const prevBtn = document.getElementById('prevBtn');
            const nextBtn = document.getElementById('nextBtn');

            currentPage = pagination.currentPage;
            totalPages = pagination.totalPages;

            pageInfo.textContent = `Page ${currentPage} of ${totalPages}`;
            prevBtn.disabled = !pagination.hasPrevPage;
            nextBtn.disabled = !pagination.hasNextPage;

            paginationDiv.style.display = 'flex';
        }

        function changePage(delta) {
            const newPage = currentPage + delta;
            if (newPage >= 1 && newPage <= totalPages) {
                currentPage = newPage;
                loadRegistrations();
            }
        }

        function applyFilters() {
            currentFilters = {
                search: document.getElementById('searchInput').value,
                gender: document.getElementById('genderFilter').value,
                ageGroup: document.getElementById('ageFilter').value,
                hasFiles: document.getElementById('filesFilter').value,
                sortBy: document.getElementById('sortBy').value,
                sortOrder: document.getElementById('sortOrder').value
            };

            currentPage = 1;
            loadRegistrations();
        }

        function clearFilters() {
            document.getElementById('searchInput').value = '';
            document.getElementById('genderFilter').value = '';
            document.getElementById('ageFilter').value = '';
            document.getElementById('filesFilter').value = '';
            document.getElementById('sortBy').value = 'registration_date';
            document.getElementById('sortOrder').value = 'DESC';

            currentFilters = {};
            currentPage = 1;
            loadRegistrations();
        }

        async function exportToCSV() {
            if (!currentEventId) {
                showMessage('Please select an event first', 'error');
                return;
            }

            try {
                const token = localStorage.getItem('token');
                const response = await fetch(`/api/events/${currentEventId}/export-registrations?format=csv`, {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                if (response.ok) {
                    const blob = await response.blob();
                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `event-${currentEventId}-registrations.csv`;
                    a.click();
                    window.URL.revokeObjectURL(url);
                    showMessage('CSV exported successfully!', 'success');
                } else {
                    showMessage('Failed to export CSV', 'error');
                }
            } catch (error) {
                console.error('Error exporting CSV:', error);
                showMessage('Error exporting CSV', 'error');
            }
        }

        async function downloadAllFiles() {
            if (!currentEventId) {
                showMessage('Please select an event first', 'error');
                return;
            }

            try {
                const token = localStorage.getItem('token');
                const response = await fetch(`/api/events/${currentEventId}/registrations-with-files`, {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                if (response.ok) {
                    const data = await response.json();
                    let downloadCount = 0;

                    data.registrations.forEach(registration => {
                        registration.uploadedFiles.forEach(file => {
                            const link = document.createElement('a');
                            link.href = file.downloadUrl;
                            link.download = `${registration.name}-${file.originalName}`;
                            link.click();
                            downloadCount++;
                        });
                    });

                    if (downloadCount > 0) {
                        showMessage(`Downloaded ${downloadCount} files!`, 'success');
                    } else {
                        showMessage('No files to download', 'error');
                    }
                } else {
                    showMessage('Failed to download files', 'error');
                }
            } catch (error) {
                console.error('Error downloading files:', error);
                showMessage('Error downloading files', 'error');
            }
        }

        function previewFile(filename, originalName, mimetype, previewUrl) {
            const modal = document.getElementById('fileModal');
            const modalTitle = document.getElementById('modalTitle');
            const modalContent = document.getElementById('modalContent');

            modalTitle.textContent = originalName;

            if (mimetype.startsWith('image/')) {
                modalContent.innerHTML = `
                    <img src="${previewUrl}" alt="${originalName}" class="file-preview">
                    <p><strong>File:</strong> ${originalName}</p>
                    <p><strong>Type:</strong> ${mimetype}</p>
                    <a href="/api/events/download-file/${filename}" class="btn btn-primary" download="${originalName}">Download File</a>
                `;
            } else {
                modalContent.innerHTML = `
                    <p><strong>File:</strong> ${originalName}</p>
                    <p><strong>Type:</strong> ${mimetype}</p>
                    <p>This file type cannot be previewed. Click download to access the file.</p>
                    <a href="/api/events/download-file/${filename}" class="btn btn-primary" download="${originalName}">Download File</a>
                `;
            }

            modal.style.display = 'block';
        }

        function closeModal() {
            document.getElementById('fileModal').style.display = 'none';
        }

        function showLoading() {
            document.getElementById('tableContainer').innerHTML = '<div class="loading">Loading registrations...</div>';
        }

        function showMessage(message, type) {
            const container = document.getElementById('messageContainer');
            const messageDiv = document.createElement('div');
            messageDiv.className = type;
            messageDiv.textContent = message;
            container.appendChild(messageDiv);

            setTimeout(() => {
                messageDiv.remove();
            }, 5000);
        }

        // Close modal when clicking outside
        window.onclick = function(event) {
            const modal = document.getElementById('fileModal');
            if (event.target === modal) {
                closeModal();
            }
        }
    </script>
</body>
</html>
