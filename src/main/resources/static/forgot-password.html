<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | CrewCanvas</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/modern-core.css">
    <style>
        body {
            background-color: var(--bg-main);
            margin: 0;
            padding: 0;
            min-height: 100vh;
        }
        .main-content {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: linear-gradient(rgba(10, 12, 16, 0.9), rgba(10, 12, 16, 0.9)), 
                        url('images/auth_premium.png');
            background-size: cover;
            background-position: center;
        }
        .auth-container {
            width: 100%;
            max-width: 440px;
            padding: 40px;
            z-index: 10;
        }
        .logo-section {
            text-align: center;
            margin-bottom: 32px;
        }
        .form-group {
            margin-bottom: 24px;
        }
        .back-to-login {
            text-align: center;
            margin-top: 24px;
        }
        .back-to-login a {
            color: var(--text-dim);
            text-decoration: none;
            font-size: 14px;
            transition: var(--transition-smooth);
        }
        .back-to-login a:hover {
            color: white;
        }
        #messageArea {
            margin-bottom: 20px;
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            display: none;
            word-break: break-word;
            overflow-wrap: anywhere;
            line-height: 1.4;
        }
        .success { background: rgba(16, 185, 129, 0.1); color: #10b981; border: 1px solid rgba(16, 185, 129, 0.2); }
        .error { background: rgba(239, 68, 68, 0.1); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.2); }
    </style>
</head>
<body>
    <main class="main-content">
        <div class="auth-container glass-card animate-fade-up">
            <div class="logo-section">
                <h1 class="gradient-text">Reset Password</h1>
                <p style="color: var(--text-dim); font-size: 14px;">Enter your email to receive a reset link</p>
            </div>

            <div id="messageArea"></div>

            <form id="forgotPasswordForm">
                <div class="form-group">
                    <label style="display: block; margin-bottom: 8px; color: var(--text-dim); font-size: 13px;">Email Address</label>
                    <input type="email" id="email" class="premium-input" placeholder="name@studio.com" required>
                </div>
                <button type="submit" id="submitBtn" class="premium-btn" style="width: 100%;">
                    Send Reset Link
                </button>
            </form>

            <div class="back-to-login">
                <a href="index.html">← Back to Sign In</a>
            </div>
        </div>
    </main>

    <script src="js/utils.js?v=1.2"></script>
    <script>
        document.getElementById('forgotPasswordForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const submitBtn = document.getElementById('submitBtn');
            const messageArea = document.getElementById('messageArea');

            submitBtn.disabled = true;
            submitBtn.innerText = 'Sending...';

            try {
                const response = await fetch('/api/auth/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });

                if (response.ok) {
                    const data = await response.json();
                    // If data is an object with message, use it; otherwise fallback to a default success message
                    messageArea.innerText = (data && data.message) ? data.message : 'Reset link has been sent to your email.';
                    messageArea.className = 'success';
                    document.getElementById('forgotPasswordForm').style.display = 'none';
                } else {
                    const errorMsg = await response.text();
                    messageArea.innerText = errorMsg || 'Unable to send reset link. Please verify your email.';
                    messageArea.className = 'error';
                    submitBtn.disabled = false;
                    submitBtn.innerText = 'Send Reset Link';
                }
                messageArea.style.display = '-webkit-box';
            } catch (error) {
                console.error('Forgot password error:', error);
                messageArea.innerText = 'Something went wrong. Please check your connection and try again.';
                messageArea.className = 'error';
                messageArea.style.display = '-webkit-box';
                submitBtn.disabled = false;
                submitBtn.innerText = 'Send Reset Link';
            }
        });
    </script>
</body>
</html>
