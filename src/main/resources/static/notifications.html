<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notifications | CrewCanvas</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/main.css">
    <style>
        :root {
            --bg-dark: #ffffff;
            --bg-card: #f8fafc;
            --primary: #ff8c00;
            --accent: #ff4c3b;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border: #e2e8f0;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            display: flex;
            min-height: 100vh;
        }

        .main-content {
            flex: 1;
            padding: 110px 40px 40px;
            width: 100%;
        }

        @media (max-width: 1024px) {
            .main-content {
                padding: 15px;
                padding-bottom: 100px;
                padding-top: 80px;
            }
            .section-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 15px;
                margin-bottom: 25px;
            }
            .section-title {
                font-size: 24px;
            }
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        .section-title {
            font-size: 28px;
            font-weight: 800;
            margin: 0;
            position: relative;
        }

        .section-title::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 0;
            width: 30px;
            height: 4px;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            border-radius: 2px;
        }

        .mark-read-btn {
            background: #fff;
            border: 1px solid var(--border);
            padding: 6px 12px;
            border-radius: 10px;
            font-size: 11px;
            font-weight: 700;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            white-space: nowrap;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }

        .mark-read-btn:hover {
            border-color: var(--primary);
            color: var(--primary);
            background: #fff;
            transform: translateY(-1px);
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .mark-read-btn i {
            font-size: 12px;
        }

        /* Notifications List */
        .notif-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .notif-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 16px 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            transition: all 0.2s;
            cursor: pointer;
            position: relative;
        }

        .notif-card:hover {
            transform: translateX(5px);
            border-color: var(--primary);
            background: #fff;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .notif-card.unread {
            background: #fff;
            border-left: 4px solid var(--primary);
        }

        .notif-avatar-box {
            width: 42px;
            height: 42px;
            flex-shrink: 0;
        }

        .notif-avatar-box img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }

        .notif-info {
            flex: 1;
        }

        .notif-info p {
            font-size: 14px;
            line-height: 1.4;
            color: var(--text-main);
            margin: 0;
        }

        .notif-info p strong {
            font-weight: 700;
        }

        .notif-meta {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 4px;
        }

        .notif-time {
            font-size: 11px;
            color: var(--text-muted);
        }

        .notif-type-tag {
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .tag-follow { background: #e0f2fe; color: #0369a1; }
        .tag-like { background: #fee2e2; color: #b91c1c; }
        .tag-comment { background: #f0fdf4; color: #15803d; }
        .tag-message { background: #fef9c3; color: #a16207; }
        .tag-event { background: #ede9fe; color: #6d28d9; }

        .loading-shimmer {
            padding: 20px;
            text-align: center;
            color: var(--text-muted);
            font-size: 14px;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }

        .empty-state i {
            font-size: 40px;
            margin-bottom: 15px;
            opacity: 0.3;
        }
    </style>
</head>
<body>
    <!-- Sidebar is dynamically injected by utils.js -->

    <div class="main-content">
        <header class="top-header"></header>

        <div class="section-header">
            <h2 class="section-title">Notifications</h2>
            <div style="display: flex; gap: 8px; flex-wrap: wrap;">
                <button class="mark-read-btn" onclick="markAllRead()">
                    <i class="fas fa-check-double"></i> Mark all read
                </button>
                <button class="mark-read-btn" onclick="clearAllNotifs()" style="border-color: #fee2e2; color: #ef4444;">
                    <i class="fas fa-trash-alt"></i> Clear
                </button>
            </div>
        </div>

        <div id="notificationsList" class="notif-container">
            <div class="loading-shimmer">
                <i class="fas fa-circle-notch fa-spin"></i> Loading notifications...
            </div>
        </div>
    </div>

    <script src="js/utils.js"></script>
    <script src="js/profile-handler.js"></script>
    <script src="js/notifications-page.js"></script>
</body>
</html>
