<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Desktop</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <header class="sidebar-header">
                <div class="user-profile">
                    <img id="current-user-img" src="https://ui-avatars.com/api/?name=Me" alt="Profile">
                </div>
                <div class="header-actions">
                    <button title="New Chat"><i class="fa-solid fa-message"></i></button>
                    <button title="Menu"><i class="fa-solid fa-ellipsis-vertical"></i></button>
                </div>
            </header>
            
            <div class="search-container">
                <div class="search-bar">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input type="text" placeholder="Search or start new chat">
                </div>
            </div>

            <div class="conversation-list" id="conversation-list">
                <!-- Conversations will be loaded here -->
                <div class="loading-chats">Loading conversations...</div>
            </div>
        </aside>

        <!-- Main Chat Window -->
        <main class="chat-window" id="chat-window">
            <div class="chat-placeholder" id="chat-placeholder">
                <div class="placeholder-content">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" alt="WhatsApp" width="80">
                    <h1>WhatsApp for Web</h1>
                    <p>Send and receive messages without keeping your phone online.<br>Use WhatsApp on up to 4 linked devices and 1 phone at the same time.</p>
                </div>
                <div class="placeholder-footer">
                    <i class="fa-solid fa-lock"></i> End-to-end encrypted
                </div>
            </div>

            <div class="chat-active" id="chat-active" style="display: none;">
                <header class="chat-header">
                    <div class="chat-user-info">
                        <button class="back-btn" id="back-btn"><i class="fa-solid fa-arrow-left"></i></button>
                        <img id="active-user-img" src="" alt="">
                        <div class="user-details">
                            <h2 id="active-user-name">User Name</h2>
                            <p id="active-user-status" class="online">online</p>
                        </div>
                    </div>
                    <div class="chat-actions">
                        <button><i class="fa-solid fa-magnifying-glass"></i></button>
                        <button><i class="fa-solid fa-ellipsis-vertical"></i></button>
                    </div>
                </header>

                <div class="message-container" id="message-container">
                    <!-- Messages will be loaded here -->
                </div>

                <footer class="input-area">
                    <button class="emoji-btn"><i class="fa-regular fa-face-smile"></i></button>
                    <button class="attach-btn"><i class="fa-solid fa-plus"></i></button>
                    <div class="message-input-wrapper">
                        <input type="text" id="message-input" placeholder="Type a message" autocomplete="off">
                    </div>
                    <button class="send-btn" id="send-btn"><i class="fa-solid fa-paper-plane"></i></button>
                </footer>
            </div>
        </main>
    </div>

    <!-- SockJS and StompJS libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.6.1/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
    <script src="chat.js"></script>
</body>
</html>
